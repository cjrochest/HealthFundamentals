<script>
  // Codes stored as SHA-256 hashes — actual values never appear in source
  const CODE_HASHES = [
    "1042084c1897ab386b629e2cb78ee2e9888a0d51d1425fd1705207e24a352502",
    "f3cf32d062cc5d20c2a44ca90ee8bb60547c161d5a1808732ebf128ef6b347ac",
    "1499ac46bb59234ebba5bd7efff98ce50c031a391f0e6f5fb9ababcedbc4552f",
  ];
  const STORAGE_KEY = "hf_proplus_access_v1";

  async function hashCode(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }

  async function checkCode() {
    const input   = document.getElementById("code-input");
    const errorEl = document.getElementById("error-msg");
    const entered = input.value.trim().toUpperCase().replace(/\s+/g,"");
    if (!entered) {
      errorEl.textContent = "Please enter your access code.";
      input.classList.add("error"); return;
    }
    const h = await hashCode(entered);
    if (CODE_HASHES.includes(h)) {
      errorEl.textContent = "";
      localStorage.setItem(STORAGE_KEY, h); // store hash, never the raw code
      unlockApp();
    } else {
      errorEl.textContent = "Incorrect code — check your confirmation email.";
      input.classList.add("error");
      input.addEventListener("input", () => input.classList.remove("error"), {once:true});
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("code-input").addEventListener("keydown", e => {
      if (e.key === "Enter") checkCode();
    });
    // Check if already unlocked (stored hash)
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored && CODE_HASHES.includes(stored)) unlockApp();
  });

  window._appReady = false;
  window._unlockPending = false;

  function unlockApp() {
    document.getElementById("gate").style.display = "none";
    document.getElementById("loading").classList.add("visible");
    if (window._appReady) {
      mountApp();
    } else {
      window._unlockPending = true;
    }
  }

  function mountApp() {
    document.getElementById("loading").classList.remove("visible");
    document.getElementById("app-root").classList.add("visible");
    const root = ReactDOM.createRoot(document.getElementById("app-root"));
    root.render(React.createElement(App));
  }
</script>

<script type="text/babel">
const { useState, useMemo, useRef, useCallback } = React;

const STYLE = `
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b08;--s1:#131410;--s2:#1b1d16;--s3:#22251a;--border:#272920;
  --accent:#c8f135;--adim:rgba(200,241,53,0.11);--aborder:rgba(200,241,53,0.26);
  --orange:#f5a623;--odim:rgba(245,166,35,0.1);--oborder:rgba(245,166,35,0.25);
  --blue:#5db8fe;--bdim:rgba(93,184,254,0.1);--bborder:rgba(93,184,254,0.25);
  --red:#ff6b6b;--rdim:rgba(255,107,107,0.1);--rborder:rgba(255,107,107,0.25);
  --purple:#c084fc;--pdim:rgba(192,132,252,0.1);--pborder:rgba(192,132,252,0.25);
  --teal:#2dd4bf;--tdim:rgba(45,212,191,0.1);--tborder:rgba(45,212,191,0.25);

}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;max-width:430px;margin:0 auto;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.app{display:flex;flex-direction:column;min-height:100vh;padding-bottom:92px;}

/* TOP BAR */
.top-bar{padding:16px 18px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(10,11,8,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.brand{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;}
.brand em{color:var(--accent);font-style:normal;}
.access-badge{background:var(--adim);border:1px solid var(--aborder);border-radius:99px;padding:4px 12px;font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,11,8,0.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 20px;z-index:100;}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 10px;transition:all 0.15s;}
.nav-icon{font-size:1.2rem;}
.nav-label{font-size:0.56rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);transition:color 0.15s;}
.nav-btn.active .nav-label{color:var(--accent);}

/* HERO */
.hero{margin:14px 16px 0;padding:20px;background:linear-gradient(140deg,#141b08 0%,#0a0f05 100%);border:1px solid #1f2814;border-radius:var(--r);position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(200,241,53,0.08) 0%,transparent 70%);}
.hero-eyebrow{font-size:0.62rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;}
.hero-title{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;line-height:1.05;color:var(--text);}
.hero-sub{font-size:0.78rem;color:var(--muted);margin-top:7px;line-height:1.5;}

/* SECTION */
.section-head{padding:20px 18px 10px;display:flex;justify-content:space-between;align-items:baseline;}
.section-title{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;color:var(--text);}
.section-sub{font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;}

/* CARDS */
.card-stack{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;transition:border-color 0.18s;}

.card.clickable:active{transform:scale(0.985);}
.card.open{border-color:var(--aborder);}
.card.open-orange{border-color:var(--oborder);}
.card.open-blue{border-color:var(--bborder);}
.card.open-purple{border-color:var(--pborder);}
.card.open-teal{border-color:var(--tborder);}

/* TAGS */
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.tag{font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:99px;border:1px solid var(--border);color:var(--muted);background:var(--s2);}

.card-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text);line-height:1.2;}

const WEEK_PROGRESSIONS = [
  { num:1, name:"Foundation",   setsBase:3, repsBase:"10–12", restBase:"60s",  intensityNote:"Light weight. Form first. Leave 2–3 reps in reserve." },
  { num:2, name:"Consistency",  setsBase:3, repsBase:"10–12", restBase:"60s",  intensityNote:"Add 5 lbs or 2 reps to anything that felt easy Week 1." },
  { num:3, name:"Progression",  setsBase:4, repsBase:"8–10",  restBase:"75s",  intensityNote:"4 sets. Heavier weight. Add a drop set to your last set." },
  { num:4, name:"Breakthrough", setsBase:4, repsBase:"6–8",   restBase:"90s",  intensityNote:"Peak week. Heaviest weights of the program. Push hard." },
];

const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function buildPlan(prefs) {
  const { daysPerWeek, selectedDays, level, sex = "male", week } = prefs;
  const prog = WEEK_PROGRESSIONS[week - 1];
  const sexKey = sex === "female" ? "female" : "male";
  const splitsBySex = SPLIT_TEMPLATES[sexKey];
  const split = splitsBySex[daysPerWeek]?.[level] || splitsBySex[3][level];
  const db = EXERCISE_DB[sexKey];
  const gymDays = selectedDays.filter(d => !prefs.cardioDays?.includes(d)).slice(0, daysPerWeek);

  // For female, vary reps: higher reps on glute/leg days for mind-muscle, lower on strength days
  function getReps(mg) {
    if (sexKey === "female" && (mg === "glutes" || mg === "legs")) return prog.repsBase;
    return prog.repsBase;
  }

  return gymDays.map((day, i) => {
    const muscleGroups = split[i % split.length];
    const exercises = muscleGroups.flatMap(mg => {
      const pool = db[mg] || EXERCISE_DB.male[mg] || [];
      const count = muscleGroups.length === 1 ? 5 : muscleGroups.length === 2 ? 3 : 2;
      return pool.slice(0, count).map(ex => ({
        ...ex,
        sets: `${prog.setsBase}×${getReps(mg)}`,
        muscle: mg,
      }));
    });
    const focusLabel = muscleGroups.map(m => {
      const labels = { glutes:"Glutes", legs:"Legs", back:"Back", shoulders:"Shoulders", chest:"Chest", arms:"Arms", core:"Core" };
      return labels[m] || m.charAt(0).toUpperCase() + m.slice(1);
    }).join(" & ");
    return {
      id: `day-${i}`, day, name: `${focusLabel} Day`,
      focus: focusLabel, duration: `${45 + daysPerWeek * 2} min`,
      rest: prog.restBase, desc: prog.intensityNote, exercises,
      isCardio: false,
    };
  });
}

function copyText(t) { try { navigator.clipboard.writeText(t); } catch { const e=document.createElement("textarea");e.value=t;e.style.cssText="position:fixed;opacity:0";document.body.appendChild(e);e.select();document.execCommand("copy");document.body.removeChild(e); } }
function workoutToText(w,weekName) {

  t += `\nNote: ${w.desc}\n— Health Fundamentals`;
  return t;
}
function mealToText(m) {
  let t=`🍽 ${m.name.toUpperCase()}\n${m.time}\nMacros: ${m.protein}g P · ${m.carbs}g C · ${m.fat}g F · ${m.calories} cal\n\nINGREDIENTS:\n`;
  m.ingredients.forEach(i=>{t+=`• ${i}\n`;}); t+=`\nPREP: ${m.prep}\n— Health Fundamentals`; return t;
}
function buildGroceryFromMeals(activeMeals, days = 7) {
  // ── Quantity parser ──────────────────────────────────────────────────────────
  const FRACS = {"½":0.5,"¼":0.25,"¾":0.75,"⅓":0.333,"⅔":0.667,"⅛":0.125};

  function parseQty(raw) {
    let s = raw.trim();
    for (const [f, v] of Object.entries(FRACS)) s = s.replaceAll(f, String(v));
    // "1.5 cups spinach", "6oz chicken", "2 tbsp salsa", "3 eggs"
    const m = s.match(/^([\d.]+)\s*(oz|cup|cups|tbsp|tsp|scoop|scoops|slice|slices|g|kg|lb|lbs|)[\s]+(.*)/i);
    if (m) return { qty: parseFloat(m[1]), unit: m[2].toLowerCase().replace("cups","cup").replace("scoops","scoop").replace("slices","slice").replace("lbs","lb"), name: m[3].trim() };
    // "6oz" with no space
    const m2 = s.match(/^([\d.]+)(oz|g|kg|lb|lbs)(.*)/i);
    if (m2) return { qty: parseFloat(m2[1]), unit: m2[2].toLowerCase(), name: m2[3].trim() };
    return null;
  }

  function fmtQty(qty, unit) {
    // Round to nearest sensible fraction
    const rounded = Math.round(qty * 4) / 4;
    const whole   = Math.floor(rounded);
    const frac    = rounded - whole;
    const fracStr = frac === 0.5 ? "½" : frac === 0.25 ? "¼" : frac === 0.75 ? "¾" : frac === 0.333 ? "⅓" : "";
    const numStr  = whole > 0 ? (fracStr ? `${whole} ${fracStr}` : String(whole)) : (fracStr || String(rounded));
    return unit ? `${numStr} ${unit}` : numStr;
  }

  // ── Category keywords ────────────────────────────────────────────────────────
  const CATS = [
    ["🥩 Proteins",        ["chicken","turkey","beef","salmon","tuna","steak","sirloin","egg","protein powder","cottage cheese","greek yogurt","ground turkey","ground beef","meatball","sausage","shrimp"]],
    ["🥦 Produce",         ["spinach","tomato","bell pepper","broccoli","asparagus","avocado","banana","sweet potato","zucchini","cucumber","lettuce","romaine","carrot","berry","berries","strawberr","blueberr","pineapple","apple","basil","cilantro","green bean","scallion","dill","lemon","lime","onion","garlic","kale"]],
    ["🧀 Dairy",           ["milk","cheese","parmesan","cheddar","yogurt","butter","cream","sour cream","tzatziki"]],
    ["🌾 Grains & Pantry", ["rice","oat","pasta","quinoa","bread","wrap","tortilla","cracker","granola","farro","penne","rigatoni","spaghetti","flour","rice cake","bean","black bean","lentil"]],
    ["🫙 Sauces & Staples",["oil","sauce","soy","salsa","hummus","mayo","honey","cinnamon","seasoning","sriracha","mustard","hot sauce","dressing","caesar","marinara","pico","guac","spice","pepper","salt","cumin","chili","paprika","rosemary","sesame","chia","almond butter","peanut butter","vinegar"]],
  ];
  const CAT_ORDER = CATS.map(c => c[0]);

  function categorize(name) {
    const low = name.toLowerCase();
    for (const [cat, keys] of CATS) {
      if (keys.some(k => low.includes(k))) return cat;
    }
    return "🛒 Other";
  }

  // ── Aggregate ingredients across all meals × 7 days ─────────────────────────
  // Key = normalized ingredient name (for dedup/summing)
  const agg = {}; // key → { displayName, qty, unit, cat, hasQty }

  activeMeals.forEach(meal => {
    if (!meal?.ingredients) return;
    meal.ingredients.forEach(raw => {
      // Skip pure seasoning/staple lines with no real quantity
      if (/^(salt|pepper|herbs|spices|to taste|as needed)/i.test(raw.trim())) {
        const cat = "🫙 Sauces & Staples";
        const key = raw.toLowerCase().replace(/[^a-z]/g,"").slice(0,20);
        if (!agg[key]) agg[key] = { displayName: raw.trim(), qty: null, unit: "", cat, hasQty: false };
        return;
      }

      const parsed = parseQty(raw);
      if (parsed) {
        const { qty, unit, name } = parsed;
        // Normalize name for grouping (strip cooking adjectives)
        const normName = name.toLowerCase()
          .replace(/\b(grilled|baked|cooked|roasted|sliced|mashed|diced|chopped|frozen|lean|whole|low-fat|non-fat|low-sodium|boneless|skinless|canned|drained|fresh)\b/g,"")
          .replace(/\s+/g," ").trim();
        const key = normName.replace(/[^a-z0-9 ]/g,"").slice(0,28);
        const scaled = qty * days;
        if (agg[key]) {
          // Only sum if same unit
          if (agg[key].unit === unit) {
            agg[key].qty += scaled;
          }
          // If unit mismatch, keep the first entry (edge case)
        } else {
          agg[key] = { displayName: name, qty: scaled, unit, cat: categorize(name), hasQty: true };
        }
      } else {
        // No parseable quantity — staple/misc item, show once
        const key = raw.toLowerCase().replace(/[^a-z]/g,"").slice(0,20);
        if (!agg[key]) agg[key] = { displayName: raw.trim(), qty: null, unit: "", cat: categorize(raw), hasQty: false };
      }
    });
  });

  // ── Group by category ────────────────────────────────────────────────────────
  const categorized = {};
  Object.values(agg).forEach(({ displayName, qty, unit, cat, hasQty }) => {
    if (!categorized[cat]) categorized[cat] = [];
    const label = hasQty ? `${fmtQty(qty, unit)} ${displayName}` : displayName;
    categorized[cat].push(label);
  });

  // Sort categories in logical shopping order
  const sorted = {};
  CAT_ORDER.forEach(cat => { if (categorized[cat]) sorted[cat] = categorized[cat]; });
  if (categorized["🛒 Other"]) sorted["🛒 Other"] = categorized["🛒 Other"];

  return sorted;
}

function groceryToText(categorized) {
  let t = `🛒 GROCERY LIST\n\n`;
  Object.entries(categorized).forEach(([cat, items]) => {
    t += `${cat}\n`;
    items.forEach(i => { t += `• ${i}\n`; });
    t += `\n`;
  });
  t += `— Health Fundamentals`;
  return t;
}
function calculateTDEE(w,ft,inch,a,sex,act) {
  const ww=parseFloat(w),fft=parseFloat(ft)||0,iinch=parseFloat(inch)||0,aa=parseFloat(a);
  if(!ww||(!fft&&!iinch)||!aa) return null;
  const heightCm = (fft * 12 + iinch) * 2.54;
  const bmr=sex==="male"?10*ww*0.453592+6.25*heightCm-5*aa+5:10*ww*0.453592+6.25*heightCm-5*aa-161;
  const mults={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very:1.9};
  return Math.round(bmr*(mults[act]||1.55));
}
function Toast({msg,show}){return <div className={`toast${show?" show":""}`}><span>✓</span> {msg}</div>;}

function PlanBuilder({ onGenerate }) {
  const [step, setStep] = useState(0);
  const [prefs, setPrefs] = useState({
    // body stats
    sex: "", weight: "", feet: "", inches: "", age: "",
    // program
    level: "", goal: "", daysPerWeek: 0,
    selectedDays: [], cardioDays: [],
    cardioEnabled: false, cardioType: "",
    cardioFreq: 0, week: 1,
  });

  function p(k, v) { setPrefs(prev => ({ ...prev, [k]: v })); }

  const statsComplete = prefs.sex !== "" && prefs.weight !== "" && prefs.feet !== "" && prefs.age !== "";

  const canNext = [
    statsComplete,                                       // step 0: body stats
    prefs.level !== "",                                  // step 1: experience
    prefs.goal !== "",                                   // step 2: goal
    prefs.daysPerWeek > 0,                               // step 3: days per week
    prefs.selectedDays.length === prefs.daysPerWeek,     // step 4: which days
    true,                                                // step 5: cardio (always passable)
  ];

  function toggleDay(day) {
    const gymDays = prefs.selectedDays;
    const cardioDays = prefs.cardioDays;
    if (cardioDays.includes(day)) {
      setPrefs(prev => ({ ...prev, cardioDays: cardioDays.filter(d => d !== day) }));
      return;
    }
    if (gymDays.includes(day)) {
      setPrefs(prev => ({ ...prev, selectedDays: gymDays.filter(d => d !== day) }));
    } else if (gymDays.length < prefs.daysPerWeek) {
      setPrefs(prev => ({ ...prev, selectedDays: [...gymDays, day] }));
    }
  }

  const STEPS = [
    // Step 0 — body stats + sex
    <div key="s0">
      <div className="step-label">Step 1 of 6</div>
      <div className="step-title">Let's start with the basics.</div>

      {/* Sex selector */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>Sex</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[["male","Male 💪","Strength & muscle-focused program"],["female","Female 🍑","Glute, leg & toning-focused program"]].map(([val,label,sub])=>(
            <div key={val} className={`cardio-option${prefs.sex===val?" selected":""}`} onClick={()=>p("sex",val)} style={{textAlign:"center"}}>
              <div className="co-title">{label}</div>
              <div className="co-detail" style={{fontSize:"0.68rem"}}>{sub}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Stats row */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div className="field">
          <span className="field-label">Weight (lbs)</span>
          <input className="field-input" type="number" placeholder="150" value={prefs.weight} onChange={e=>p("weight",e.target.value)}/>
        </div>
        <div className="field">
          <span className="field-label">Age</span>
          <input className="field-input" type="number" placeholder="28" value={prefs.age} onChange={e=>p("age",e.target.value)}/>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div className="field">
          <span className="field-label">Height — Feet</span>
          <input className="field-input" type="number" placeholder="5" min="3" max="7" value={prefs.feet} onChange={e=>p("feet",e.target.value)}/>
        </div>
        <div className="field">
          <span className="field-label">Inches</span>
          <input className="field-input" type="number" placeholder="6" min="0" max="11" value={prefs.inches} onChange={e=>p("inches",e.target.value)}/>
        </div>
      </div>

      {prefs.sex && (
        <div style={{marginTop:14,background:prefs.sex==="female"?"var(--pdim)":"var(--adim)",border:`1px solid ${prefs.sex==="female"?"var(--pborder)":"var(--aborder)"}`,borderRadius:"var(--r-sm)",padding:"10px 14px",fontSize:"0.78rem",color:"var(--text)",lineHeight:1.5}}>
          {prefs.sex==="female"
            ? "🍑 Your program will prioritize glutes, legs & core every session, with toning-focused upper body work."
            : "💪 Your program will balance strength across all muscle groups with progressive overload."}
        </div>
      )}
    </div>,

    // Step 1 — experience
    <div key="s1">
      <div className="step-label">Step 2 of 6</div>
      <div className="step-title">What's your training experience?</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {[["beginner","Beginner","New to lifting, or returning after a long break"],["intermediate","Intermediate","6+ months of consistent training"]].map(([val,label,sub])=>(
          <div key={val} className={`cardio-option${prefs.level===val?" selected":""}`} onClick={()=>p("level",val)}>
            <div className="co-title">{label}</div>
            <div className="co-detail">{sub}</div>
          </div>
        ))}
      </div>
    </div>,

    // Step 2 — goal
    <div key="s2">
      <div className="step-label">Step 3 of 6</div>
      <div className="step-title">What's your primary goal?</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {[
          ["cut",    prefs.sex==="female"?"Lean Out 🔥":"Lose Fat 🔥",            prefs.sex==="female"?"Calorie deficit — lose fat, keep muscle tone":"Calorie deficit, preserve muscle"],
          ["maintain",prefs.sex==="female"?"Recomp & Tone ⚖️":"Body Recomposition ⚖️", prefs.sex==="female"?"Maintain weight, improve shape and definition":"Maintain weight, improve composition"],
          ["build",  prefs.sex==="female"?"Build & Sculpt 💪":"Build Muscle 💪",   prefs.sex==="female"?"Moderate surplus — grow glutes and legs, stay lean":"Calorie surplus, maximize growth"],
        ].map(([val,label,sub])=>(
          <div key={val} className={`cardio-option${prefs.goal===val?" selected":""}`} onClick={()=>p("goal",val)}>
            <div className="co-title">{label}</div>
            <div className="co-detail">{sub}</div>
          </div>
        ))}
      </div>
    </div>,

    // Step 3 — days per week
    <div key="s3">
      <div className="step-label">Step 4 of 6</div>
      <div className="step-title">How many days per week can you train?</div>
      <div className="pill-grid">
        {[2,3,4,5,6].map(n=>(
          <div key={n} className={`pill${prefs.daysPerWeek===n?" selected":""}`} onClick={()=>p("daysPerWeek",n)}>
            {n} days
          </div>
        ))}
      </div>
      {prefs.daysPerWeek > 0 && (
        <div className="days-note">
          {prefs.daysPerWeek <= 3 ? "Great for busy schedules. Full recovery between sessions." :
           prefs.daysPerWeek === 4 ? "Ideal balance of volume and recovery." :
           "High frequency. Make sure sleep and nutrition are dialed in."}
        </div>
      )}
    </div>,

    // Step 4 — which days
    <div key="s4">
      <div className="step-label">Step 5 of 6</div>
      <div className="step-title">Which days work for you? ({prefs.selectedDays.length}/{prefs.daysPerWeek} selected)</div>
      <div className="day-grid">
        {DAYS.map(day => {
          const isGym = prefs.selectedDays.includes(day);
          const isCardio = prefs.cardioDays.includes(day);
          return (
            <div key={day}
              className={`day-pill${isGym?" selected":""}${isCardio?" cardio-day":""}`}
              onClick={()=>toggleDay(day)}>
              {day}
            </div>
          );
        })}
      </div>
      <div className="days-note">Tap to select your gym days. Rest days assigned automatically.</div>
    </div>,

    // Step 5 — cardio
    <div key="s5">
      <div className="step-label">Step 6 of 6</div>
      <div className="step-title">Do you want to include cardio?</div>

      <div className={`cardio-toggle-row${prefs.cardioEnabled?" on":""}`}
        onClick={()=>p("cardioEnabled",!prefs.cardioEnabled)}>
        <div className="ctg-left">
          <div className="ctg-title">Include Cardio Sessions</div>
          <div className="ctg-sub">Adds cardio to your plan and adjusts calories</div>
        </div>
        <div className={`toggle-switch${prefs.cardioEnabled?" on":""}`}>
          <div className="toggle-knob"/>
        </div>
      </div>

      {prefs.cardioEnabled && (
        <>
          <div style={{marginTop:12,marginBottom:8,fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--orange)"}}>Choose Cardio Type</div>
          <div className="cardio-options">
            {CARDIO_TYPES.map(ct=>(
              <div key={ct.id} className={`cardio-option${prefs.cardioType===ct.id?" selected":""}`}
                onClick={()=>p("cardioType",ct.id)}>
                <div className="co-title">{ct.label}</div>
                <div className="co-detail">{ct.desc}</div>
                <div className="co-burn">{ct.burnNote}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:14,marginBottom:8,fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--orange)"}}>Sessions Per Week</div>
          <div className="pill-grid">
            {[1,2,3].map(n=>(
              <div key={n} className={`pill${prefs.cardioFreq===n?" selected-orange selected":""}`}
                onClick={()=>p("cardioFreq",n)}>
                {n}×/week
              </div>
            ))}
          </div>
          {prefs.cardioType && prefs.cardioFreq > 0 && (
            <div style={{marginTop:12,background:"var(--odim)",border:"1px solid var(--oborder)",borderRadius:"var(--r-sm)",padding:"12px 14px"}}>
              <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--orange)",marginBottom:6}}>Calorie Impact</div>
              <div style={{fontSize:"0.82rem",color:"var(--text)",lineHeight:1.5}}>
                {prefs.cardioFreq}× {CARDIO_TYPES.find(c=>c.id===prefs.cardioType)?.label}/week
                = ~{(CARDIO_TYPES.find(c=>c.id===prefs.cardioType)?.burn||0)*prefs.cardioFreq} extra cal/week.
                <span style={{color:"var(--muted)"}}> Your meal plan will increase accordingly.</span>
              </div>
            </div>
          )}
        </>
      )}
    </div>,
  ];

  const isLastStep = step === STEPS.length - 1;

  return (
    <div>
      <div className="section-head">
        <span className="section-title">Build Your Plan</span>
        <span className="section-sub">Step {step+1} of {STEPS.length}</span>
      </div>

      {/* Progress bar */}
      <div style={{padding:"0 16px 16px",display:"flex",gap:6}}>
        {STEPS.map((_,i)=>(
          <div key={i} style={{flex:1,height:3,borderRadius:99,background:i<=step?"var(--accent)":"var(--s3)",transition:"background 0.3s"}}/>
        ))}
      </div>

      <div className="onboard-wrap">
        <div className="onboard-step">{STEPS[step]}</div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          {step > 0 && (
            <button className="action-btn btn-secondary" style={{marginTop:0,flex:"0 0 80px"}} onClick={()=>setStep(s=>s-1)}>
              ← Back
            </button>
          )}
          <button
            className="generate-btn"
            style={{flex:1,marginTop:0,borderRadius:"var(--r-sm)",padding:13,fontSize:"0.82rem"}}
            disabled={!canNext[step]}
            onClick={()=>{
              if (isLastStep) onGenerate({...prefs, week:1});
              else setStep(s=>s+1);
            }}>
            {isLastStep ? "⚡ Generate My Plan" : "Continue →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── MACRO TAB ────────────────────────────────────────────────────────────────
function MacroTab({ prefs }) {
  const [form, setForm] = useState({
    weight: prefs.weight || "",
    feet:   prefs.feet   || "",
    inches: prefs.inches || "",
    age:    prefs.age    || "",
    sex:    prefs.sex    || "male",
    activity:"moderate"
  });
  const [goal, setGoal] = useState(prefs.goal||"maintain");
  const [result, setResult] = useState(null);
  const [manual, setManual] = useState(null);
  const [copied, setCopied] = useState(false);
  const [toast, setToast] = useState({show:false,msg:""});

  function f(k,v){setForm(p=>({...p,[k]:v}));setResult(null);setManual(null);}

  function calculate(){
    const tdee = calculateTDEE(form.weight,form.feet,form.inches,form.age,form.sex,form.activity);
    if(!tdee) return;
    const adj = goal==="cut"?tdee-400:goal==="build"?tdee+300:tdee;
    const protein = Math.round(adj*0.3/4);
    const fat = Math.round(adj*0.25/9);
    const carbs = Math.round((adj-protein*4-fat*9)/4);
    setResult({tdee,calories:adj,protein,carbs,fat});
    setManual({protein,carbs,fat});
  }

  const dm = manual;
  const baseCals = dm ? dm.protein*4+dm.carbs*4+dm.fat*9 : 0;

  // cardio adjustment
  const ct = CARDIO_TYPES.find(c=>c.id===prefs.cardioType);
  const cardioCalPerDay = prefs.cardioEnabled && ct && prefs.cardioFreq
    ? Math.round((ct.burn * prefs.cardioFreq) / 7) : 0;
  const adjustedCals = baseCals + cardioCalPerDay;
  const adjustedCarbs = dm ? Math.round(dm.carbs + cardioCalPerDay/4) : 0;

  const totalG = dm ? dm.protein+dm.carbs+dm.fat : 1;
  const pPct = dm?Math.round(dm.protein/totalG*100):0;
  const cPct = dm?Math.round(dm.carbs/totalG*100):0;
  const fPct = dm?Math.round(dm.fat/totalG*100):0;

  function handleCopy(){
    if(!dm) return;
    const g=goal.charAt(0).toUpperCase()+goal.slice(1);
    let t=`📊 MY DAILY MACROS\nGoal: ${g}\nBase Calories: ${baseCals} kcal\nProtein: ${dm.protein}g\nCarbs: ${dm.carbs}g\nFat: ${dm.fat}g`;
    if(cardioCalPerDay>0) t+=`\n\nWith ${prefs.cardioFreq}× ${ct?.label}/week:\nAdjusted Calories: ${adjustedCals} kcal\nAdjusted Carbs: ${adjustedCarbs}g`;
    t+=`\n— Health Fundamentals`;
    copyText(t);
    setCopied(true);
    setToast({show:true,msg:"Macros copied — paste into Notes!"});
    setTimeout(()=>{setCopied(false);setToast({show:false,msg:""});},2400);
  }

  return (
    <div>
      <div className="section-head"><span className="section-title">Macro Calculator</span></div>
      <div className="calc-panel">
        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:10}}>Goal</div>
        <div className="goal-pills">
          {[["cut","Cut 🔥"],["maintain","Maintain ⚖️"],["build","Build 💪"]].map(([g,l])=>(
            <button key={g} className={`goal-pill${goal===g?" active":""}`} onClick={()=>{setGoal(g);setResult(null);setManual(null);}}>{l}</button>
          ))}
        </div>
        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:10}}>Your Stats</div>
        <div className="form-row">
          <div className="field"><span className="field-label">Weight (lbs)</span><input className="field-input" type="number" placeholder="180" value={form.weight} onChange={e=>f("weight",e.target.value)}/></div>
          <div className="field"><span className="field-label">Age</span><input className="field-input" type="number" placeholder="30" value={form.age} onChange={e=>f("age",e.target.value)}/></div>
        </div>
        <div className="form-row">
          <div className="field"><span className="field-label">Height — Feet</span><input className="field-input" type="number" placeholder="5" min="3" max="7" value={form.feet} onChange={e=>f("feet",e.target.value)}/></div>
          <div className="field"><span className="field-label">Inches</span><input className="field-input" type="number" placeholder="10" min="0" max="11" value={form.inches} onChange={e=>f("inches",e.target.value)}/></div>
        </div>
        <div className="form-row">
          <div className="field"><span className="field-label">Sex</span><select className="field-select" value={form.sex} onChange={e=>f("sex",e.target.value)}><option value="male">Male</option><option value="female">Female</option></select></div>
        </div>
        <div className="field" style={{marginBottom:14}}>
          <span className="field-label">Activity Level</span>
          <select className="field-select" value={form.activity} onChange={e=>f("activity",e.target.value)}>
            <option value="sedentary">Sedentary — desk job, &lt;3,000 steps/day</option>
            <option value="light">Light — light movement, ~3,000–6,000 steps/day</option>
            <option value="moderate">Moderate — gym 3–5×/week, ~6,000–10,000 steps/day</option>
            <option value="active">Active — gym 6–7×/week, ~10,000–15,000 steps/day</option>
            <option value="very">Very Active — physical job + training, 15,000+ steps/day</option>
          </select>
        </div>
        <button className="action-btn btn-primary" style={{marginTop:0}} onClick={calculate}>Calculate My Macros</button>

        {result && dm && (
          <div className="result-strip">
            <div style={{fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>
              TDEE: <span style={{color:"var(--text)"}}>{result.tdee} cal</span> · {goal==="cut"?"−400 deficit":goal==="build"?"+300 surplus":"Maintenance"}
            </div>
            <div className="result-cals">
              <span className="result-cal-num">{baseCals}</span>
              <span className="result-cal-label">base cal / day</span>
            </div>
            <div className="macro-result-row">
              {[["Protein","protein"],["Carbs","carbs"],["Fat","fat"]].map(([label,key])=>(
                <div key={key} className="mrb">
                  <input type="number" value={manual[key]} onChange={e=>setManual(m=>({...m,[key]:Number(e.target.value)}))}/>
                  <div className="mrb-label">{label}</div>
                  <div className="mrb-kcal">{key==="fat"?manual[key]*9:manual[key]*4} kcal</div>
                </div>
              ))}
            </div>
            <div className="macro-bar-row">
              <div className="mbar-p" style={{width:`${pPct}%`}}/>
              <div className="mbar-c" style={{width:`${cPct}%`}}/>
              <div className="mbar-f" style={{width:`${fPct}%`}}/>
            </div>
            <div className="macro-legend">
              {[["var(--accent)","Protein",pPct],["var(--orange)","Carbs",cPct],["var(--blue)","Fat",fPct]].map(([c,l,p])=>(
                <div key={l} className="legend-item"><div className="legend-dot" style={{background:c}}/>{l} {p}%</div>
              ))}
            </div>

            {/* Cardio impact */}
            {prefs.cardioEnabled && ct && prefs.cardioFreq > 0 && (
              <div className="cardio-impact">
                <div className="ci-title">🏃 Cardio Adjustment — {prefs.cardioFreq}× {ct.label}/week</div>
                <div className="ci-row"><span className="ci-label">Extra burn/week</span><span className="ci-val">~{ct.burn*prefs.cardioFreq} cal</span></div>
                <div className="ci-row"><span className="ci-label">Extra burn/day (avg)</span><span className="ci-val">+{cardioCalPerDay} cal</span></div>
                <div className="ci-row" style={{marginBottom:0}}><span className="ci-label">Adjusted daily total</span><span className="ci-val" style={{fontSize:"0.95rem",fontWeight:700}}>{adjustedCals} cal</span></div>
                <div className="ci-note">
                  To compensate for cardio burn, eat an additional ~{cardioCalPerDay} calories on cardio days — primarily from carbohydrates (+{Math.round(cardioCalPerDay/4)}g carbs). This prevents underfueling your training sessions and supports recovery.
                </div>
              </div>
            )}

            <button className={`action-btn${copied?" btn-saved":" btn-secondary"}`} onClick={handleCopy}>
              {copied?"✓ Copied!":"📋 Copy Macros to Notes"}
            </button>
            <div className="calc-note">Starting points — not rigid rules. Adjust ±50 cal after 2 weeks based on how your body responds. Macro fields are editable.</div>
          </div>
        )}
      </div>
      <Toast msg={toast.msg} show={toast.show}/>
    </div>
  );
}

// ─── MEAL SELECTION HELPER ────────────────────────────────────────────────────
const SLOT_CONFIGS = {
  3: ["breakfast","lunch","dinner"],
  4: ["breakfast","lunch","snack","dinner"],
  5: ["breakfast","lunch","snack","preworkout","dinner"],
};
const SLOT_LABELS = {
  breakfast: "Breakfast", lunch: "Lunch", snack: "Snack",
  preworkout: "Pre-Workout", dinner: "Dinner",
};

function getAvailableMeals(goal, slot, avoidTags) {
  const pool = MEAL_POOL[goal]?.[slot] || [];
  return pool.filter(m => !m.tags.some(t => avoidTags.includes(t)));
}

function pickMealForWeek(goal, slot, avoidTags, weekNum, pinnedId) {
  const available = getAvailableMeals(goal, slot, avoidTags);
  if (!available.length) return null;
  if (pinnedId) {
    const pinned = available.find(m => m.id === pinnedId);
    if (pinned) return pinned;
  }
  // Rotate by week index so each week shows a different meal
  return available[weekNum % available.length];
}

// ─── MEALS TAB ────────────────────────────────────────────────────────────────
function MealsTab({ prefs, mealState, setMealState }) {
  const [goal,       setGoal]       = useState(prefs.goal || "maintain");
  const [week,       setWeek]       = useState(prefs.week || 1);
  const [openId,     setOpenId]     = useState(null);
  const [saved,      setSaved]      = useState({});
  const [configOpen, setConfigOpen] = useState(false);
  const [toast,      setToast]      = useState({ show:false, msg:"" });

  // Shared state — synced with GroceryTab
  const { mealCount, pinned, avoidTags } = mealState || { mealCount:4, pinned:{}, avoidTags:[] };
  const setMealCount = (v)  => setMealState(s => ({...s, mealCount: v}));
  const setPinned    = (fn) => setMealState(s => ({...s, pinned: typeof fn==="function" ? fn(s.pinned) : fn}));
  const setAvoidTags = (fn) => setMealState(s => ({...s, avoidTags: typeof fn==="function" ? fn(s.avoidTags) : fn}));

  const activeSlots = SLOT_CONFIGS[mealCount];

  // Derive active meals based on goal, week, meal count, pins, and avoidTags
  const activeMeals = useMemo(() => {
    return activeSlots.map(slot => pickMealForWeek(goal, slot, avoidTags, week - 1, pinned[slot])).filter(Boolean);
  }, [goal, week, mealCount, avoidTags, pinned]);

  const ct = CARDIO_TYPES.find(c => c.id === prefs.cardioType);
  const totalCals = activeMeals.reduce((s,m) => s + m.calories, 0);
  const totalP    = activeMeals.reduce((s,m) => s + m.protein,  0);
  const totalC    = activeMeals.reduce((s,m) => s + m.carbs,    0);
  const totalF    = activeMeals.reduce((s,m) => s + m.fat,      0);
  const cardioAdj = prefs.cardioEnabled && ct && prefs.cardioFreq ? Math.round(ct.burn * prefs.cardioFreq / 7) : 0;
  const adjustedCals = totalCals + cardioAdj;

  function showToast(msg) { setToast({ show:true, msg }); setTimeout(() => setToast({ show:false, msg:"" }), 2400); }
  function handleSave(m, e) { e.stopPropagation(); copyText(mealToText(m)); setSaved(s => ({ ...s, [m.id]:true })); showToast("Copied — paste into Notes!"); }

  function togglePin(meal) {
    setPinned(prev => {
      const already = prev[meal.slot] === meal.id;
      if (already) {
        const next = { ...prev }; delete next[meal.slot]; return next;
      }
      return { ...prev, [meal.slot]: meal.id };
    });
  }

  function toggleAvoid(tagId) {
    setAvoidTags(prev => {
      const next = prev.includes(tagId) ? prev.filter(t => t !== tagId) : [...prev, tagId];
      // Clear any pins that are now invalid
      activeSlots.forEach(slot => {
        if (pinned[slot]) {
          const still = getAvailableMeals(goal, slot, next).find(m => m.id === pinned[slot]);
          if (!still) setPinned(p => { const n = { ...p }; delete n[slot]; return n; });
        }
      });
      return next;
    });
  }

  function nextWeekMeal(meal) {
    const available = getAvailableMeals(goal, meal.slot, avoidTags);
    if (available.length <= 1) { showToast("No other options — try adjusting food prefs"); return; }
    const cur = available.findIndex(m => m.id === meal.id);
    const next = available[(cur + 1) % available.length];
    setPinned(prev => ({ ...prev, [meal.slot]: next.id }));
    setOpenId(null);
    showToast(`Swapped to: ${next.name}`);
  }

  const WEEK_NUMS = [1,2,3,4];

  return (
    <div>
      {/* ── Header ── */}
      <div className="section-head">
        <span className="section-title">Meal Prep</span>
        <span className="section-sub">{adjustedCals} cal/day</span>

          {[["cut","Cut 🔥"],["maintain","Maintain ⚖️"],["build","Build 💪"]].map(([g,l])=>(
            <button key={g} className={`goal-pill${goal===g?" active":""}`}
              onClick={()=>{ setGoal(g); setOpenId(null); setSaved({}); setPinned({}); }}>{l}</button>
          ))}
        </div>
        {/* Configure button */}
        <button onClick={()=>setConfigOpen(true)} style={{
          background: avoidTags.length > 0 ? "var(--odim)" : "var(--s2)",

          borderRadius:"var(--r-sm)", padding:"7px 12px", cursor:"pointer",
          fontSize:"0.7rem", fontWeight:700, color: avoidTags.length > 0 ? "var(--orange)" : "var(--muted)",
          display:"flex", alignItems:"center", gap:5, whiteSpace:"nowrap", flexShrink:0,
        }}>
          ⚙️ {avoidTags.length > 0 ? `${avoidTags.length} filter${avoidTags.length>1?"s":""}` : "Configure"}
        </button>
      </div>

      {/* ── Meals per day selector ── */}
      <div style={{padding:"0 16px 14px"}}>
        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>
          Meals per day
        </div>
        <div style={{display:"flex",gap:6}}>
          {[
            [3, "3 meals", "Breakfast · Lunch · Dinner"],
            [4, "4 meals", "+ Snack"],
            [5, "5 meals", "+ Pre-Workout"],
          ].map(([count, label, sub]) => (
            <button key={count}
              onClick={()=>{ setMealCount(count); setOpenId(null); setSaved({}); }}
              style={{
                flex:1, background: mealCount===count ? "var(--adim)" : "var(--s2)",
                border: `1px solid ${mealCount===count ? "var(--aborder)" : "var(--border)"}`,

function GroceryTab({ prefs, mealState }) {
  const [generated, setGenerated]   = useState(false);

  const [copied,    setCopied]      = useState(false);
  const [toast,     setToast]       = useState({show:false,msg:""});

  // ── Derive active meals using the same shared state as MealsTab ─────────────
  const activeMeals = useMemo(() => {
    const goal   = prefs.goal || "maintain";
    const week   = prefs.week || 1;
    const mCount = (mealState && mealState.mealCount) || 4;
    const pins   = (mealState && mealState.pinned)    || {};
    const blocked= (mealState && mealState.avoidTags) || [];

    const SLOT_CONFIGS = {
      3: ["breakfast","lunch","dinner"],
      4: ["breakfast","lunch","snack","dinner"],
      5: ["breakfast","lunch","snack","preworkout","dinner"],
    };
    const slots = SLOT_CONFIGS[mCount] || SLOT_CONFIGS[4];
    const pool  = MEAL_POOL[goal] || MEAL_POOL["maintain"];

    return slots.map(slot => {
      const options = (pool[slot] || []).filter(m =>
        !blocked.some(b => m.tags && m.tags.includes(b))
      );
      if (!options.length) return null;
      const pinnedId = pins[slot];
      if (pinnedId) {
        const p = options.find(m => m.id === pinnedId);
        if (p) return p;
      }
      const idx = (week - 1) % options.length;
      return options[idx];
    }).filter(Boolean);
  }, [prefs, mealState]);

  const DAYS = 7;
  const categorized = useMemo(() => buildGroceryFromMeals(activeMeals, DAYS), [activeMeals]);

  const allKeys = Object.entries(categorized).flatMap(([cat,items]) =>
    items.map(i => `${cat}::${i}`)
  );
  const checkedCount = Object.values(checked).filter(Boolean).length;
  const progress     = allKeys.length > 0 ? checkedCount / allKeys.length : 0;
  const mealNames    = activeMeals.map(m => m.name);

  function handleCopy() {
    copyText(groceryToText(categorized));
    setCopied(true);
    setToast({show:true, msg:"List copied — paste into Notes!"});
    setTimeout(() => { setCopied(false); setToast({show:false,msg:""}); }, 2400);
  }

  function handleReset() {
    setChecked({});
    setGenerated(false);
  }

  return (
    <div>
      <div className="section-head">
        <span className="section-title">Grocery List</span>
        <span className="section-sub">{generated ? `${checkedCount}/${allKeys.length}` : "7-day"}</span>
      </div>

      <div style={{padding:"0 16px"}}>

        {/* Active meals preview */}
        {activeMeals.length > 0 && (
          <div style={{background:"var(--s1)",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"12px 14px",marginBottom:14}}>
            <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--orange)",marginBottom:8}}>
              Week {prefs.week||1} · 7-day quantities
            </div>
            {mealNames.map((n,i) => (
              <div key={i} style={{fontSize:"0.78rem",color:"var(--muted)",padding:"3px 0",borderBottom:i<mealNames.length-1?"1px solid rgba(39,41,32,0.4)":"none",display:"flex",gap:8,alignItems:"center"}}>
                <span style={{color:"var(--accent)"}}>·</span>{n}
              </div>
            ))}
          </div>
        )}

        {!generated ? (
          <button className="grocery-gen-btn" onClick={() => setGenerated(true)}>
            <span style={{fontSize:"2rem"}}>🛒</span>
            <div>
              <div className="ggb-title">Build This Week's List</div>
              <div className="ggb-sub">Full 7-day list · {allKeys.length} items</div>
            </div>
          </button>
        ) : (
          <>
            {/* Progress bar */}
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.7rem",color:"var(--muted)",marginBottom:5}}>
                <span>Shopping progress</span>
                <span style={{color:"var(--accent)"}}>{Math.round(progress*100)}%</span>
              </div>
              <div className="prog-wrap"><div className="prog-fill" style={{width:`${progress*100}%`}}/></div>
            </div>

            {/* Grocery items */}
            <div className="grocery-container">
              {Object.entries(categorized).map(([cat, items]) => (
                <div key={cat} className="grocery-cat">
                  <div className="grocery-cat-head">{cat}</div>
                  {items.map(item => {
                    const key = `${cat}::${item}`;
                    const isC = !!checked[key];
                    return (
                      <div key={key} className={`grocery-item${isC?" checked":""}`}

                      onClick={handleReset}>↺</button>
            </div>

        )}

const PROGRESS_KEY = "hf_progress_v1";

function loadProgress() {
  try {
    const raw = localStorage.getItem(PROGRESS_KEY);
    return raw ? JSON.parse(raw) : { entries: [], streaks: { checkin: 0, lastCheckin: null } };
  } catch { return { entries: [], streaks: { checkin: 0, lastCheckin: null } }; }
}

function saveProgress(data) {
  try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(data)); } catch {}
}

function formatDate(d) { return d.toISOString().split("T")[0]; }
function parseDate(s) { const [y,m,d] = s.split("-").map(Number); return new Date(y,m-1,d); }

// ── Top-level Sparkline (not nested) ────────────────────────────────────────
function ProgressSparkline({ points, minW, maxW, startWeight }) {
  const range = (maxW - minW) || 1;
  const pad = 8, W = 304, H = 84;
  if (!points || points.length < 2) return null;
  const xs = points.map((_,i) => pad + (i / (points.length - 1)) * W);
  const ys = points.map(p => pad + H - ((p - minW) / range) * H);
  const d    = xs.map((x,i) => (i===0?"M":"L")+x+","+ys[i]).join(" ");
  const fill = d + " L"+xs[xs.length-1]+","+(pad+H)+" L"+xs[0]+","+(pad+H)+" Z";
  const goalY = pad + H - ((startWeight - minW) / range) * H;
  return (
    <svg width="100%" viewBox={"0 0 320 100"} style={{overflow:"visible"}}>
      <path d={fill} fill="var(--accent)" fillOpacity="0.08"/>
      <path d={d} fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {startWeight > 0 && goalY > pad && goalY < pad+H && (
        <line x1={pad} y1={goalY} x2={pad+W} y2={goalY}
          stroke="var(--muted)" strokeWidth="1" strokeDasharray="4 3" opacity="0.5"/>
      )}
      <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r="4"
        fill="var(--accent)" stroke="var(--bg)" strokeWidth="2"/>
    </svg>
  );
}

// ── Main ProgressTab ─────────────────────────────────────────────────────────
function ProgressTab({ prefs }) {
  const startWeight   = (prefs && prefs.weight) ? prefs.weight : 0;
  const [data, setData]             = useState(loadProgress);
  const [inputVal, setInputVal]     = useState("");
  const [view, setView]             = useState("month");
  const [showShare, setShowShare]   = useState(false);
  const [toast, setToast]           = useState({ show: false, msg: "" });

  const today = formatDate(new Date());
  const entries        = (data && data.entries) ? data.entries : [];
  const todayEntry     = entries.find(function(e){ return e.date === today; });
  const checkinStreak  = (data && data.streaks && data.streaks.checkin) ? data.streaks.checkin : 0;

  const filtered = useMemo(function() {
    const now = new Date();
    const cutoff = new Date();
    if (view === "week")  cutoff.setDate(now.getDate() - 6);
    if (view === "month") cutoff.setDate(now.getDate() - 29);
    if (view === "year")  cutoff.setFullYear(now.getFullYear() - 1);
    return entries
      .filter(function(e){ return parseDate(e.date) >= cutoff; })
      .sort(function(a,b){ return a.date.localeCompare(b.date); });
  }, [entries, view]);

  const minW  = filtered.length ? Math.min.apply(null, filtered.map(function(e){return e.weight;})) : (startWeight > 5 ? startWeight - 5 : 0);
  const maxW  = filtered.length ? Math.max.apply(null, filtered.map(function(e){return e.weight;})) : startWeight + 5;
  const firstW = filtered.length ? filtered[0].weight : null;
  const lastW  = filtered.length ? filtered[filtered.length-1].weight : null;
  const totalChange = (firstW != null && lastW != null) ? (lastW - firstW) : null;
  const avgW = filtered.length ? (filtered.reduce(function(s,e){return s+e.weight;}, 0) / filtered.length).toFixed(1) : null;

  function logWeight() {
    const val = parseFloat(inputVal);
    if (isNaN(val) || val < 50 || val > 600) { showToastMsg("Enter a valid weight (50–600 lbs)"); return; }
    const newEntry   = { date: today, weight: val };
    const existing   = entries.filter(function(e){ return e.date !== today; });
    const newEntries = existing.concat([newEntry]).sort(function(a,b){ return a.date.localeCompare(b.date); });
    const yesterday  = formatDate(new Date(Date.now() - 86400000));
    const lastCheckin = data.streaks ? data.streaks.lastCheckin : null;
    let streak = (data.streaks && data.streaks.checkin) ? data.streaks.checkin : 0;
    if (lastCheckin === yesterday) { streak = streak + 1; }
    else if (lastCheckin === today) { /* unchanged */ }
    else { streak = 1; }
    const newData = { entries: newEntries, streaks: { checkin: streak, lastCheckin: today } };
    setData(newData);
    saveProgress(newData);
    setInputVal("");
    showToastMsg(todayEntry ? "Weight updated!" : "Logged! Keep it up");
  }

  function deleteEntry(date) {
    const newEntries = entries.filter(function(e){ return e.date !== date; });
    const newData = { entries: newEntries, streaks: data.streaks };
    setData(newData);
    saveProgress(newData);
  }

  function showToastMsg(msg) {
    setToast({ show: true, msg: msg });
    setTimeout(function(){ setToast({ show: false, msg: "" }); }, 2500);
  }

  return (
    <div className="tab-content">
      {toast.show && (
        <div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",
          background:"var(--accent)",color:"#0a0b08",borderRadius:99,padding:"8px 20px",
          fontSize:"0.8rem",fontWeight:700,zIndex:999,whiteSpace:"nowrap"}}>
          {toast.msg}
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {[
          {label:"Current",   value: lastW ? lastW+" lbs" : "—",  color:"var(--text)"},
          {label:"Change",    value: totalChange != null ? (totalChange>0?"+":"")+totalChange.toFixed(1)+" lbs" : "—",
           color: totalChange != null ? (totalChange < 0 ? "var(--accent)" : "var(--orange)") : "var(--text)"},
          {label:"Streak",    value: checkinStreak+"d", color:"var(--accent)"},
        ].map(function(s) {
          return (
            <div key={s.label} style={{background:"var(--s1)",border:"1px solid var(--border)",
              borderRadius:"var(--r)",padding:"12px 8px",textAlign:"center"}}>
              <div style={{fontSize:"0.6rem",color:"var(--muted)",fontWeight:700,letterSpacing:"0.08em",
                textTransform:"uppercase",marginBottom:4}}>{s.label}</div>
              <div style={{fontSize:"1.2rem",fontWeight:800,color:s.color}}>{s.value}</div>
            </div>
          );
        })}
      </div>

      <div style={{background:"var(--s1)",border:"1px solid var(--border)",borderRadius:"var(--r)",
        padding:"16px",marginBottom:16}}>
        <div style={{fontSize:"0.7rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",
          color:"var(--accent)",marginBottom:10}}>
          {todayEntry ? "Today: "+todayEntry.weight+" lbs — update?" : "Log today's weight"}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input
            type="number"
            placeholder={todayEntry ? String(todayEntry.weight) : "lbs"}
            value={inputVal}
            onChange={function(e){setInputVal(e.target.value);}}
            onKeyDown={function(e){if(e.key==="Enter")logWeight();}}
            style={{flex:1,background:"var(--bg)",border:"1px solid var(--border)",borderRadius:8,
              padding:"10px 12px",color:"var(--text)",fontSize:"1rem",fontFamily:"var(--ff-mono)",
              fontWeight:700,outline:"none",WebkitAppearance:"none"}}
          />
          <button onClick={logWeight}
            style={{background:"var(--accent)",color:"#0a0b08",border:"none",borderRadius:8,
              padding:"10px 18px",fontWeight:800,fontSize:"0.85rem",cursor:"pointer",
              fontFamily:"var(--ff-display)",whiteSpace:"nowrap"}}>
            Log
          </button>
        </div>
        <div style={{fontSize:"0.65rem",color:"var(--muted)",marginTop:6}}>
          Tip: weigh first thing in the morning, after using the bathroom.
        </div>
      </div>

      {filtered.length > 1 ? (
        <div style={{background:"var(--s1)",border:"1px solid var(--border)",borderRadius:"var(--r)",
          padding:"16px",marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:"0.7rem",fontWeight:700,letterSpacing:"0.1em",
              textTransform:"uppercase",color:"var(--accent)"}}>Weight trend</div>
            <div style={{display:"flex",gap:6}}>
              {["week","month","year"].map(function(v){
                return (
                  <button key={v} onClick={function(){setView(v);}}
                    style={{background:view===v?"var(--adim)":"transparent",
                      border:"1px solid "+(view===v?"var(--aborder)":"var(--border)"),
                      borderRadius:99,padding:"3px 10px",fontSize:"0.65rem",fontWeight:700,
                      color:view===v?"var(--accent)":"var(--muted)",cursor:"pointer"}}>
                    {v.charAt(0).toUpperCase()+v.slice(1)}
                  </button>
                );
              })}
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style={{display:"flex",flexDirection:"column",justifyContent:"space-between",
              height:100,minWidth:36,textAlign:"right"}}>
              <div style={{fontSize:"0.6rem",color:"var(--muted)",fontFamily:"var(--ff-mono)"}}>{maxW.toFixed(0)}</div>
              <div style={{fontSize:"0.6rem",color:"var(--muted)",fontFamily:"var(--ff-mono)"}}>{((maxW+minW)/2).toFixed(0)}</div>
              <div style={{fontSize:"0.6rem",color:"var(--muted)",fontFamily:"var(--ff-mono)"}}>{minW.toFixed(0)}</div>
            </div>
            <div style={{flex:1}}>
              <ProgressSparkline points={filtered.map(function(e){return e.weight;})} minW={minW} maxW={maxW} startWeight={startWeight}/>
            </div>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",paddingLeft:44,marginTop:4,fontSize:"0.6rem",color:"var(--muted)"}}>
            {filtered.length > 0 && [filtered[0],filtered[Math.floor(filtered.length/2)],filtered[filtered.length-1]].map(function(e,i){
              return e ? <span key={i}>{e.date.slice(5)}</span> : null;
            })}
          </div>
          <div style={{display:"flex",gap:16,marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
            {[
              {label:"Avg",     value: avgW ? avgW+" lbs" : "—"},
              {label:"Low",     value: filtered.length ? minW.toFixed(1)+" lbs" : "—"},
              {label:"High",    value: filtered.length ? maxW.toFixed(1)+" lbs" : "—"},
              {label:"Entries", value: String(filtered.length)},
            ].map(function(s){
              return (
                <div key={s.label} style={{flex:1,textAlign:"center"}}>
                  <div style={{fontSize:"0.55rem",color:"var(--muted)",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>{s.label}</div>
                  <div style={{fontSize:"0.85rem",fontWeight:700,color:"var(--text)",fontFamily:"var(--ff-mono)"}}>{s.value}</div>
                </div>
              );
            })}
          </div>
        </div>
      ) : (
        <div style={{background:"var(--s1)",border:"1px solid var(--border)",borderRadius:"var(--r)",
          padding:"20px",textAlign:"center",marginBottom:16,color:"var(--muted)",fontSize:"0.85rem"}}>
          Log 2+ entries to see your trend chart.
        </div>
      )}

      <div style={{marginBottom:16}}>
        <button onClick={function(){setShowShare(function(v){return !v;});}}
          style={{width:"100%",background:"var(--s1)",border:"1px solid var(--aborder)",
            borderRadius:"var(--r)",padding:"12px",fontWeight:700,fontSize:"0.85rem",
            color:"var(--accent)",cursor:"pointer"}}>
          {showShare ? "Hide share card" : "Generate share card"}
        </button>
        {showShare && (
          <div style={{marginTop:12}}>
            <ProgressShareCard
              lastW={lastW}
              totalChange={totalChange}
              daysLogged={entries.length}
              checkinStreak={checkinStreak}
              today={today}
              shareUrl="cjrochest.github.io/HealthFundamentals/pro-plus"
            />
            <div style={{fontSize:"0.7rem",color:"var(--muted)",textAlign:"center",marginTop:10}}>
              Take a screenshot to share your progress.
            </div>
          </div>
        )}
      </div>

      {entries.length > 0 && (
        <div style={{background:"var(--s1)",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"16px"}}>
          <div style={{fontSize:"0.7rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",
            color:"var(--accent)",marginBottom:10}}>History ({entries.length})</div>
          <div style={{maxHeight:200,overflowY:"auto"}}>
            {entries.slice().reverse().map(function(e) {
              return (
                <div key={e.date} style={{display:"flex",justifyContent:"space-between",
                  alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
                  <span style={{fontSize:"0.8rem",color:"var(--muted)",fontFamily:"var(--ff-mono)"}}>{e.date}</span>
                  <span style={{fontSize:"0.95rem",fontWeight:700,fontFamily:"var(--ff-mono)",color:"var(--text)"}}>{e.weight} lbs</span>
                  <button onClick={function(){deleteEntry(e.date);}}
                    style={{background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:"0.75rem",padding:"2px 6px"}}>
                    x
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}


function HomeTab({ prefs, setTab }) {
  const weekInfo = WEEK_PROGRESSIONS[prefs.week-1];
  const ct = CARDIO_TYPES.find(c=>c.id===prefs.cardioType);
  return (
    <div>
      <div className="hero">
        <div className="hero-eyebrow">Week {prefs.week} · {weekInfo.name} · {prefs.level.charAt(0).toUpperCase()+prefs.level.slice(1)}</div>
        <div className="hero-title">{prefs.goal==="cut"?"Burn Fat. Keep Muscle.":prefs.goal==="build"?"Build. Eat. Repeat.":"Train Smart. Stay Consistent."}</div>
        <div className="hero-sub">{weekInfo.intensityNote}</div>
      </div>
      <div className="section-head" style={{paddingBottom:6}}><span className="section-title">Your Plan</span></div>
      <div style={{padding:"0 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[
          {icon:"🏋️",label:"This Week's Workouts",tab:"workout"},
          {icon:"📊",label:"Macro Calculator",tab:"macros"},
          {icon:"🍽️",label:"Meal Prep Guide",tab:"meals"},
          {icon:"🛒",label:"Grocery List",tab:"grocery"},
          {icon:"📚",label:"Nutrition Lessons",tab:"learn"},
          {icon:"🏃",label:ct?`${ct.label} Cardio Plan`:"Add Cardio",tab:"macros"},
        ].map(item=>(
          <div key={item.tab+item.label} style={{background:"var(--s1)",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"16px 14px",cursor:"pointer"}} onClick={()=>setTab(item.tab)}>
            <div style={{fontSize:"1.4rem",marginBottom:6}}>{item.icon}</div>
            <div style={{fontSize:"0.78rem",fontWeight:700,color:"var(--text)",lineHeight:1.3}}>{item.label}</div>
          </div>
        ))}
      </div>
      <div className="section-head" style={{paddingBottom:6}}><span className="section-title">This Week</span></div>
      <div className="card-stack" style={{paddingBottom:16}}>
        {[
          {tag:"tag-g",label:"Training",text:weekInfo.intensityNote},
          {tag:"tag-o",label:"Nutrition",text:`Goal: ${prefs.goal}. ${prefs.goal==="cut"?"Eat in a moderate deficit. Protein protects your muscle.":prefs.goal==="build"?"Eat in a moderate surplus. Don't skip carbs — they fuel your sessions.":"Maintenance calories. Body recomp takes patience and consistency."}`},
          prefs.cardioEnabled&&ct&&{tag:"tag-o",label:"Cardio",text:`${prefs.cardioFreq}× ${ct.label}/week. On cardio days, add ~${ct.burn} extra calories from carbs to compensate for the burn.`},
        ].filter(Boolean).map((c,i)=>(
          <div key={i} className="card">
            <div className="tags"><span className={`tag ${c.tag}`}>{c.label}</span></div>
            <div className="card-desc" style={{color:"var(--text)",fontSize:"0.82rem"}}>{c.text}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
export default function App() {
  const [tab, setTab] = useState("home");
  const [prefs, setPrefs] = useState(null); // null = not yet built

  // Shared meal state — lifted so GroceryTab can read what MealsTab has selected
  const [mealState, setMealState] = useState({ mealCount:4, pinned:{}, avoidTags:[] });

  const NAV = [
    {id:"home",     icon:"🏠", label:"Home"},
    {id:"workout",  icon:"🏋️", label:"Train"},
    {id:"macros",   icon:"📊", label:"Macros"},
    {id:"meals",    icon:"🍽️", label:"Meals"},
    {id:"grocery",  icon:"🛒", label:"Shop"},
    {id:"progress", icon:"📈", label:"Progress"},
    {id:"learn",    icon:"📚", label:"Learn"},
  ];

  if (!prefs) {
    return (
      <>
        <style>{STYLE}</style>
        <div className="app">
          <div className="top-bar">
            <div className="brand">Health<em>Fund</em></div>
            <div className="access-badge">Full Access</div>
          </div>
          <PlanBuilder onGenerate={(p)=>{ setPrefs(p); setTab("workout"); }} />
        </div>
      </>
    );
  }

  return (
    <>
      <style>{STYLE}</style>
      <div className="app">
        <div className="top-bar">
          <div className="brand">Health<em>Fund</em></div>
          {(tab==="macros"||tab==="meals"||tab==="grocery"||tab==="learn"||tab==="progress")&&(
            <div className="access-badge">Full Access</div>
          )}
          {(tab==="home"||tab==="workout")&&(
            <div style={{fontSize:"0.7rem",color:"var(--muted)",fontWeight:700}}>
              {prefs.level.charAt(0).toUpperCase()+prefs.level.slice(1)} · Wk {prefs.week}
            </div>
          )}
        </div>

        {tab==="home"    && <HomeTab prefs={prefs} setTab={setTab}/>}
        {tab==="workout" && <WorkoutTab prefs={prefs} setPrefs={setPrefs} onRebuild={()=>setPrefs(null)}/>}
        {tab==="macros"  && <MacroTab prefs={prefs}/>}
        {tab==="meals"   && <MealsTab prefs={prefs} mealState={mealState} setMealState={setMealState}/>}
        {tab==="grocery" && <GroceryTab prefs={prefs} mealState={mealState}/>}
        {tab==="learn"    && <LearnTab/>}
        {tab==="progress" && <ProgressTab prefs={prefs}/>}
      </div>

      <div className="bottom-nav">
        {NAV.map(n=>(
          <button key={n.id} className={`nav-btn${tab===n.id?" active":""}`} onClick={()=>setTab(n.id)}>
            <span className="nav-icon">{n.icon}</span>
            <span className="nav-label">{n.label}</span>
          </button>
        ))}
      </div>
    </>
  );
}


window._appReady = true;
if (window._unlockPending) { mountApp(); }
</script>

</body>
</html>
