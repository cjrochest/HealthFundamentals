<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0a0b08"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Health Fundamentals — Full Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Lato:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:#0a0b08;-webkit-font-smoothing:antialiased;}</style>
</head>
<body>
  <div id="app-root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    const CODE_HASHES=["2355a5ac039f6c9c7700ae34798dc18535b0c7104225d7bdd64533e1c5303ba1", "d70a097fc2ed326edde69999d16d2b1cd6fb188085d44a3c450f0e8065fbc475", "1a80a74e7f1d5bf039237a326bedcba7fee9022cdc05d8f1e20c34e7e4e557ae"];
    async function sha256(m){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(m));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
    const STORAGE_KEY='hf_pro_access_v1';
    let _root=null;
    function mountApp(){if(!_root)_root=ReactDOM.createRoot(document.getElementById('app-root'));_root.render(React.createElement(App));}
    function UnlockScreen(){
      const [code,setCode]=React.useState('');
      const [err,setErr]=React.useState('');
      const [busy,setBusy]=React.useState(false);
      async function attempt(){setBusy(true);setErr('');const h=await sha256(code.trim().toUpperCase());if(CODE_HASHES.includes(h)){localStorage.setItem(STORAGE_KEY,'1');mountApp();}else{setErr('Invalid code — check your Gumroad receipt.');setBusy(false);}}
      return React.createElement('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0a0b08',padding:'24px'}},
        React.createElement('div',{style:{width:'100%',maxWidth:360,textAlign:'center'}},
          React.createElement('div',{style:{fontFamily:"'Syne',sans-serif",fontSize:'1.6rem',fontWeight:800,color:'#e9ead6',marginBottom:6}},'Health',React.createElement('em',{style:{color:'#c8f135'}},'Fund')),
          React.createElement('div',{style:{fontSize:'0.78rem',color:'#656857',marginBottom:28}},'Full Access — $29'),
          React.createElement('input',{type:'text',placeholder:'Enter access code',value:code,onChange:e=>setCode(e.target.value),onKeyDown:e=>e.key==='Enter'&&attempt(),style:{width:'100%',background:'#1a1c15',border:'1px solid #2e3028',borderRadius:10,padding:'13px 16px',color:'#e9ead6',fontSize:'0.95rem',outline:'none',marginBottom:10,fontFamily:"'Lato',sans-serif",letterSpacing:'0.08em',textAlign:'center'}}),
          React.createElement('button',{onClick:attempt,disabled:busy||!code.trim(),style:{width:'100%',background:'#c8f135',color:'#0a0b08',border:'none',borderRadius:10,padding:'13px',fontFamily:"'Syne',sans-serif",fontSize:'0.95rem',fontWeight:800,cursor:busy||!code.trim()?'not-allowed':'pointer',opacity:busy||!code.trim()?0.5:1}},busy?'Checking…':'Unlock Access'),
          err&&React.createElement('div',{style:{marginTop:10,color:'#ff6b6b',fontSize:'0.8rem'}},err),
          React.createElement('div',{style:{marginTop:16,fontSize:'0.72rem',color:'#656857'}},'Access code is in your Gumroad receipt email.')
        ))
    }
    window.addEventListener('DOMContentLoaded',()=>{
      if(localStorage.getItem(STORAGE_KEY)==='1'){if(window._appReady){mountApp();}else{window._unlockPending=true;}}
      else{if(!_root)_root=ReactDOM.createRoot(document.getElementById('app-root'));_root.render(React.createElement(UnlockScreen));}
    });
  </script>
  <script type="text/babel" data-presets="react">
const { useState, useMemo, useRef, useCallback } = React;

const STYLE = `
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b08;--s1:#131410;--s2:#1b1d16;--s3:#22251a;--border:#272920;
  --accent:#c8f135;--adim:rgba(200,241,53,0.11);--aborder:rgba(200,241,53,0.26);
  --orange:#f5a623;--odim:rgba(245,166,35,0.1);--oborder:rgba(245,166,35,0.25);
  --blue:#5db8fe;--bdim:rgba(93,184,254,0.1);--bborder:rgba(93,184,254,0.25);
  --red:#ff6b6b;--rdim:rgba(255,107,107,0.1);--rborder:rgba(255,107,107,0.25);
  --purple:#c084fc;--pdim:rgba(192,132,252,0.1);--pborder:rgba(192,132,252,0.25);
  --teal:#2dd4bf;--tdim:rgba(45,212,191,0.1);--tborder:rgba(45,212,191,0.25);
  --text:#e9ead6;--muted:#656857;--muted2:#3e4033;
  --r:14px;--r-sm:8px;--r-xs:6px;
}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;max-width:430px;margin:0 auto;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.app{display:flex;flex-direction:column;min-height:100vh;padding-bottom:92px;}

/* TOP BAR */
.top-bar{padding:16px 18px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(10,11,8,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.brand{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;}
.brand em{color:var(--accent);font-style:normal;}
.access-badge{background:var(--adim);border:1px solid var(--aborder);border-radius:99px;padding:4px 12px;font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,11,8,0.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 20px;z-index:100;}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 10px;transition:all 0.15s;}
.nav-icon{font-size:1.2rem;}
.nav-label{font-size:0.56rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);transition:color 0.15s;}
.nav-btn.active .nav-label{color:var(--accent);}

/* HERO */
.hero{margin:14px 16px 0;padding:20px;background:linear-gradient(140deg,#141b08 0%,#0a0f05 100%);border:1px solid #1f2814;border-radius:var(--r);position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(200,241,53,0.08) 0%,transparent 70%);}
.hero-eyebrow{font-size:0.62rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;}
.hero-title{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;line-height:1.05;color:var(--text);}
.hero-sub{font-size:0.78rem;color:var(--muted);margin-top:7px;line-height:1.5;}

/* SECTION */
.section-head{padding:20px 18px 10px;display:flex;justify-content:space-between;align-items:baseline;}
.section-title{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;color:var(--text);}
.section-sub{font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;}

/* CARDS */
.card-stack{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;transition:border-color 0.18s;}
.card.clickable{cursor:pointer;}
.card.clickable:active{transform:scale(0.985);}
.card.open{border-color:var(--aborder);}
.card.open-orange{border-color:var(--oborder);}
.card.open-blue{border-color:var(--bborder);}
.card.open-purple{border-color:var(--pborder);}
.card.open-teal{border-color:var(--tborder);}

/* TAGS */
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.tag{font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:99px;border:1px solid var(--border);color:var(--muted);background:var(--s2);}
.tag-g{background:var(--adim);color:var(--accent);border-color:var(--aborder);}
.tag-o{background:var(--odim);color:var(--orange);border-color:var(--oborder);}
.tag-b{background:var(--bdim);color:var(--blue);border-color:var(--bborder);}
.tag-r{background:var(--rdim);color:var(--red);border-color:var(--rborder);}
.tag-p{background:var(--pdim);color:var(--purple);border-color:var(--pborder);}
.tag-t{background:var(--tdim);color:var(--teal);border-color:var(--tborder);}

.card-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text);line-height:1.2;}
.card-desc{font-size:0.77rem;color:var(--muted);margin-top:4px;line-height:1.45;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.chevron{font-size:0.9rem;color:var(--muted);transition:transform 0.2s;flex-shrink:0;margin-left:6px;margin-top:2px;}
.chevron.open{transform:rotate(180deg);color:var(--accent);}
.card-detail{margin-top:14px;border-top:1px solid var(--border);padding-top:14px;}

/* EXERCISES */
.ex-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;padding:10px 0;border-bottom:1px solid rgba(39,41,32,0.7);}
.ex-row:last-of-type{border-bottom:none;}
.ex-name{font-size:0.88rem;font-weight:700;color:var(--text);}
.ex-tip{font-size:0.72rem;color:var(--muted);margin-top:2px;line-height:1.4;}
.ex-sets{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--accent);white-space:nowrap;text-align:right;}

/* CARDIO ROW */
.cardio-row{background:var(--odim);border:1px solid var(--oborder);border-radius:var(--r-sm);padding:10px 12px;margin-top:8px;display:flex;justify-content:space-between;align-items:center;}
.cardio-label{font-size:0.75rem;font-weight:700;color:var(--orange);}
.cardio-detail{font-size:0.7rem;color:var(--muted);}

/* BUTTONS */
.action-btn{width:100%;border:none;border-radius:var(--r-sm);padding:13px;font-family:'Lato',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity 0.15s;margin-top:14px;}
.action-btn:active{opacity:0.75;}
.btn-primary{background:var(--accent);color:#0a0b08;}
.btn-secondary{background:var(--s2);border:1px solid var(--border);color:var(--text);}
.btn-saved{background:var(--s2);border:1px solid var(--aborder);color:var(--accent);}

/* ── ONBOARDING / PLAN BUILDER ─────────────────────── */
.onboard-wrap{padding:16px;}
.onboard-step{margin-bottom:20px;}
.step-label{font-size:0.62rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.step-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:12px;}

.pill-grid{display:flex;flex-wrap:wrap;gap:8px;}
.pill{background:var(--s2);border:1px solid var(--border);border-radius:99px;padding:8px 16px;font-size:0.78rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.pill:active{transform:scale(0.96);}
.pill.selected{background:var(--adim);border-color:var(--aborder);color:var(--accent);}
.pill.selected-orange{background:var(--odim);border-color:var(--oborder);color:var(--orange);}

.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.day-pill{background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 4px;font-size:0.68rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all 0.15s;text-align:center;}
.day-pill.selected{background:var(--adim);border-color:var(--aborder);color:var(--accent);}
.day-pill.cardio-day{background:var(--odim);border-color:var(--oborder);color:var(--orange);}
.day-pill.rest-day{opacity:0.35;pointer-events:none;}

.days-note{font-size:0.72rem;color:var(--muted);margin-top:8px;line-height:1.5;}

.cardio-toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;cursor:pointer;transition:border-color 0.15s;}
.cardio-toggle-row.on{border-color:var(--oborder);}
.ctg-left{display:flex;flex-direction:column;gap:3px;}
.ctg-title{font-size:0.88rem;font-weight:700;color:var(--text);}
.ctg-sub{font-size:0.72rem;color:var(--muted);}
.toggle-switch{width:42px;height:24px;background:var(--s3);border-radius:99px;position:relative;transition:background 0.2s;flex-shrink:0;}
.toggle-switch.on{background:var(--orange);}
.toggle-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;background:white;border-radius:50%;transition:transform 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.toggle-switch.on .toggle-knob{transform:translateX(18px);}

.cardio-options{margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.cardio-option{background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;cursor:pointer;transition:all 0.15s;}
.cardio-option.selected{border-color:var(--oborder);background:var(--odim);}
.co-title{font-size:0.84rem;font-weight:700;color:var(--text);}
.co-detail{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.co-burn{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--orange);margin-top:3px;}

.generate-btn{width:100%;background:var(--accent);color:#0a0b08;border:none;border-radius:var(--r-sm);padding:16px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;letter-spacing:0.04em;cursor:pointer;margin-top:20px;transition:opacity 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.generate-btn:active{opacity:0.8;}
.generate-btn:disabled{opacity:0.35;cursor:not-allowed;}

.plan-summary-strip{margin:0 16px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;display:flex;flex-wrap:wrap;gap:8px;}
.ps-chip{font-size:0.68rem;font-weight:700;color:var(--muted);background:var(--s3);border-radius:99px;padding:4px 10px;}
.ps-chip.green{color:var(--accent);background:var(--adim);}
.ps-chip.orange{color:var(--orange);background:var(--odim);}

.rebuild-btn{font-size:0.68rem;font-weight:700;color:var(--muted);background:none;border:1px solid var(--border);border-radius:99px;padding:4px 12px;cursor:pointer;transition:all 0.15s;margin-left:auto;}
.rebuild-btn:hover{border-color:var(--aborder);color:var(--accent);}

/* WEEK SELECTOR */
.week-badge{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--border);border-radius:99px;padding:5px 12px;font-size:0.7rem;font-weight:700;letter-spacing:0.08em;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.week-badge:hover{border-color:var(--aborder);color:var(--accent);}
.week-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}

.week-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.week-modal{background:var(--s1);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;width:100%;max-width:430px;padding:20px 20px 40px;}
.wm-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:16px;}
.week-option{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all 0.15s;background:var(--s2);}
.week-option:hover{border-color:var(--aborder);}
.week-option.current{border-color:var(--aborder);background:var(--adim);}
.wo-num{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--accent);width:32px;}
.wo-name{font-size:0.88rem;font-weight:700;color:var(--text);}
.wo-sub{font-size:0.72rem;color:var(--muted);margin-top:1px;}
.wo-badge{font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:4px 8px;border-radius:99px;}
.wo-done{background:var(--adim);color:var(--accent);}
.wo-lock{background:var(--s3);color:var(--muted2);}

/* MACRO CALC */
.calc-panel{margin:0 16px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.goal-pills{display:flex;gap:6px;margin-bottom:14px;}
.goal-pill{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:99px;padding:8px 6px;font-family:'Lato',sans-serif;font-size:0.7rem;font-weight:700;text-align:center;color:var(--muted);cursor:pointer;transition:all 0.18s;}
.goal-pill.active{background:var(--adim);border-color:var(--aborder);color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field-label{font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.field-input{background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-family:'DM Mono',monospace;font-size:0.92rem;color:var(--text);outline:none;width:100%;transition:border-color 0.15s;-moz-appearance:textfield;}
.field-input:focus{border-color:var(--aborder);}
.field-input::-webkit-inner-spin-button{display:none;}
.field-select{background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-family:'Lato',sans-serif;font-size:0.88rem;color:var(--text);outline:none;width:100%;transition:border-color 0.15s;appearance:none;cursor:pointer;}
.field-select:focus{border-color:var(--aborder);}

.result-strip{margin-top:14px;padding:16px;background:var(--s2);border-radius:var(--r-sm);border:1px solid var(--border);}
.result-cals{display:flex;align-items:baseline;gap:6px;margin-bottom:14px;}
.result-cal-num{font-family:'Syne',sans-serif;font-size:2.6rem;font-weight:800;color:var(--accent);line-height:1;}
.result-cal-label{font-size:0.72rem;color:var(--muted);font-weight:600;}
.macro-result-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.mrb{background:var(--s1);border-radius:var(--r-xs);padding:10px 8px;text-align:center;}
.mrb input{background:none;border:none;outline:none;font-family:'DM Mono',monospace;font-size:1.1rem;color:var(--text);width:100%;text-align:center;padding:0;}
.mrb-label{font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.mrb-kcal{font-size:0.62rem;color:var(--muted2);margin-top:1px;}
.macro-bar-row{display:flex;gap:3px;height:8px;border-radius:99px;overflow:hidden;margin-top:10px;}
.mbar-p{background:var(--accent);border-radius:99px 0 0 99px;}
.mbar-c{background:var(--orange);}
.mbar-f{background:var(--blue);border-radius:0 99px 99px 0;}
.macro-legend{display:flex;gap:14px;margin-top:8px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:0.65rem;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:50%;}
.calc-note{font-size:0.7rem;color:var(--muted);margin-top:12px;line-height:1.5;padding:10px 12px;background:var(--s1);border-radius:var(--r-xs);border-left:2px solid var(--aborder);}

/* CARDIO IMPACT PANEL */
.cardio-impact{margin-top:14px;background:var(--odim);border:1px solid var(--oborder);border-radius:var(--r-sm);padding:14px;}
.ci-title{font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--orange);margin-bottom:8px;}
.ci-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.ci-label{font-size:0.8rem;color:var(--text);}
.ci-val{font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--orange);}
.ci-note{font-size:0.73rem;color:var(--muted);line-height:1.5;margin-top:10px;padding-top:10px;border-top:1px solid var(--oborder);}

/* MEALS */
.day-scroll{display:flex;gap:8px;padding:0 16px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px;}
.day-scroll::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;background:var(--s1);border:1px solid var(--border);border-radius:99px;padding:7px 16px;font-size:0.7rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.day-tab.active{background:var(--adim);border-color:var(--aborder);color:var(--accent);}
.meal-time{font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--orange);margin-bottom:3px;}
.meal-macro-row{display:flex;gap:10px;margin-top:8px;align-items:center;}
.meal-macro{display:flex;flex-direction:column;align-items:center;}
.meal-macro-val{font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--text);}
.meal-macro-lbl{font-size:0.58rem;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}
.mac-sep{width:1px;background:var(--border);align-self:stretch;}
.ingredient-list{list-style:none;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.ingredient-list li{font-size:0.8rem;color:var(--muted);display:flex;gap:8px;align-items:flex-start;}
.ingredient-list li::before{content:'·';color:var(--orange);font-weight:bold;flex-shrink:0;}
.prep-note{font-size:0.75rem;color:var(--muted);background:var(--s2);border-radius:var(--r-xs);padding:10px 12px;line-height:1.5;}
.cardio-meal-note{font-size:0.75rem;color:var(--orange);background:var(--odim);border:1px solid var(--oborder);border-radius:var(--r-xs);padding:10px 12px;line-height:1.5;margin-top:8px;}

/* GROCERY */
.grocery-gen-btn{width:100%;background:linear-gradient(140deg,#141f06,#0a1404);border:1px solid var(--aborder);border-radius:var(--r);padding:20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:opacity 0.2s;}
.grocery-gen-btn:active{opacity:0.8;}
.ggb-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--accent);}
.ggb-sub{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.grocery-container{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.grocery-cat{border-bottom:1px solid var(--border);}
.grocery-cat:last-child{border-bottom:none;}
.grocery-cat-head{padding:11px 16px;background:var(--s2);font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--orange);}
.grocery-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid rgba(39,41,32,0.4);cursor:pointer;transition:background 0.12s;}
.grocery-item:last-child{border-bottom:none;}
.grocery-item:active{background:var(--s2);}
.grocery-item.checked{opacity:0.4;}
.g-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.68rem;transition:all 0.15s;}
.grocery-item.checked .g-check{background:var(--accent);border-color:var(--accent);color:#0a0b08;font-weight:700;}
.g-name{font-size:0.84rem;color:var(--text);flex:1;}
.grocery-item.checked .g-name{text-decoration:line-through;color:var(--muted);}
.g-qty{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);}
.prog-wrap{height:4px;background:var(--s2);border-radius:99px;overflow:hidden;margin-top:8px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#8bc720);border-radius:99px;transition:width 0.4s ease;}

function ExerciseGif({ gifKey, name }) {
  const GITHUB_BASE = "https://cjrochest.github.io/HealthFundamentals/assets/exercises/";
  // Try gif first, then jpg, then png — script may have saved any extension
  const EXTENSIONS = ["gif", "jpg", "jpeg", "png", "webp"];
  const [extIdx, setExtIdx] = useState(0);
  const [loaded, setLoaded] = useState(false);
  const [error, setError]   = useState(false);

  if (!gifKey) return null;

  const currentSrc = GITHUB_BASE + gifKey + "." + EXTENSIONS[extIdx];

  function handleError() {
    const next = extIdx + 1;
    if (next < EXTENSIONS.length) {
      setExtIdx(next);  // try next extension
      setLoaded(false);
    } else {
      setError(true);   // all extensions exhausted
    }
  }

  return (
    <div style={{
      width:"100%", borderRadius:"var(--r-xs)", overflow:"hidden",
      background:"var(--s1)", border:"1px solid var(--border)",
      aspectRatio:"16/9", position:"relative", marginTop:4,
      display:"flex", alignItems:"center", justifyContent:"center",
      minHeight:160,
    }}>
      {!loaded && !error && (
        <div style={{position:"absolute",inset:0,background:"var(--s2)",display:"flex",
          alignItems:"center",justifyContent:"center",flexDirection:"column",gap:6}}>
          <div style={{width:28,height:28,border:"3px solid var(--border)",
            borderTopColor:"var(--accent)",borderRadius:"50%",
            animation:"spin 0.8s linear infinite"}}/>
          <div style={{fontSize:"0.6rem",color:"var(--muted)"}}>Loading visual...</div>
        </div>
      )}
      {error ? (
        <div style={{padding:16,textAlign:"center",color:"var(--muted)",fontSize:"0.72rem"}}>
          Visual not available
        </div>
      ) : (
        <img
          src={currentSrc}
          alt={name + " demonstration"}
          onLoad={()=>setLoaded(true)}
          onError={handleError}
          style={{
            width:"100%", height:"100%", objectFit:"contain",
            display:loaded?"block":"none",
            background:"#fff",
          }}
        />
      )}
    </div>
  );
}

    5: { beginner:[["glutes"],["back","core"],["legs"],["shoulders","arms"],["glutes","core"]], intermediate:[["glutes","legs"],["back"],["glutes"],["shoulders","arms"],["legs","core"]] },
    6: { beginner:[["glutes"],["back","shoulders"],["legs"],["glutes","core"],["chest","arms"],["legs"]], intermediate:[["glutes"],["back"],["legs"],["shoulders","arms"],["glutes","core"],["legs"]] },

const WEEK_PROGRESSIONS = [
  { num:1, name:"Foundation",   setsBase:3, repsBase:"10–12", restBase:"60s",  intensityNote:"Light weight. Form first. Leave 2–3 reps in reserve." },
  { num:2, name:"Consistency",  setsBase:3, repsBase:"10–12", restBase:"60s",  intensityNote:"Add 5 lbs or 2 reps to anything that felt easy Week 1." },
  { num:3, name:"Progression",  setsBase:4, repsBase:"8–10",  restBase:"75s",  intensityNote:"4 sets. Heavier weight. Add a drop set to your last set." },
  { num:4, name:"Breakthrough", setsBase:4, repsBase:"6–8",   restBase:"90s",  intensityNote:"Peak week. Heaviest weights of the program. Push hard." },
];

const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function buildPlan(prefs) {
  const { daysPerWeek, selectedDays, level, gender = "male", week } = prefs;
  const prog = WEEK_PROGRESSIONS[week - 1];
  const sexKey = gender === "female" ? "female" : "male";
  const splitsBySex = SPLIT_TEMPLATES[sexKey];
  const split = splitsBySex[daysPerWeek]?.[level] || splitsBySex[3][level];
  const db = EXERCISE_DB[sexKey];
  const gymDays = selectedDays.filter(d => !prefs.cardioDays?.includes(d)).slice(0, daysPerWeek);

  // For female, vary reps: higher reps on glute/leg days for mind-muscle, lower on strength days
  function getReps(mg) {
    if (sexKey === "female" && (mg === "glutes" || mg === "legs")) return prog.repsBase;
    return prog.repsBase;
  }

  return gymDays.map((day, i) => {
    const muscleGroups = split[i % split.length];
    const exercises = muscleGroups.flatMap(mg => {
      const pool = db[mg] || EXERCISE_DB.male[mg] || [];
      const count = muscleGroups.length === 1 ? 5 : muscleGroups.length === 2 ? 3 : 2;
      return pool.slice(0, count).map(ex => ({
        ...ex,
        sets: `${prog.setsBase}×${getReps(mg)}`,
        muscle: mg,
      }));
    });
    const focusLabel = muscleGroups.map(m => {
      const labels = { glutes:"Glutes", legs:"Legs", back:"Back", shoulders:"Shoulders", chest:"Chest", arms:"Arms", core:"Core" };
      return labels[m] || m.charAt(0).toUpperCase() + m.slice(1);
    }).join(" & ");
    return {
      id: `day-${i}`, day, name: `${focusLabel} Day`,
      focus: focusLabel, duration: `${45 + daysPerWeek * 2} min`,
      rest: prog.restBase, desc: prog.intensityNote, exercises,
      isCardio: false,
    };
  });
}

function workoutToText(w,weekName) {

}

function buildGroceryFromMeals(activeMeals, days = 7) {
  // ── Quantity parser ──────────────────────────────────────────────────────────
  const FRACS = {"½":0.5,"¼":0.25,"¾":0.75,"⅓":0.333,"⅔":0.667,"⅛":0.125};

  function parseQty(raw) {
    let s = raw.trim();
    for (const [f, v] of Object.entries(FRACS)) s = s.replaceAll(f, String(v));
    // "1.5 cups spinach", "6oz chicken", "2 tbsp salsa", "3 eggs"
    const m = s.match(/^([\d.]+)\s*(oz|cup|cups|tbsp|tsp|scoop|scoops|slice|slices|g|kg|lb|lbs|)[\s]+(.*)/i);
    if (m) return { qty: parseFloat(m[1]), unit: m[2].toLowerCase().replace("cups","cup").replace("scoops","scoop").replace("slices","slice").replace("lbs","lb"), name: m[3].trim() };
    // "6oz" with no space
    const m2 = s.match(/^([\d.]+)(oz|g|kg|lb|lbs)(.*)/i);
    if (m2) return { qty: parseFloat(m2[1]), unit: m2[2].toLowerCase(), name: m2[3].trim() };
    return null;
  }

  // ── Store-unit converter: turns recipe totals into real grocery sizes ───────
  function toStoreUnit(qty, unit, name) {
    const n = name.toLowerCase();

    // ─── Helper ───────────────────────────────────────────────────────────────
    function lbs(oz)  { return Math.ceil((oz/16) * 2) / 2; }  // round to nearest 0.5lb
    function ceil2(x) { return Math.ceil(x * 2) / 2; }

    // ═══════════════════════════════════════════════════════════════════════
    // PRODUCE — cups or countable
    // ═══════════════════════════════════════════════════════════════════════

    // Leafy greens: sell by bag
    if (n.includes("spinach") || n.includes("kale") || n.includes("arugula") || n.includes("mixed greens") || n.includes("lettuce") || n.includes("romaine")) {
      return "1 bag " + name;
    }
    // Mixed / frozen veggies: sell by bag
    if (n.includes("mixed veg") || n.includes("stir fry veg") || n.includes("frozen veg") || n.includes("vegetable mix")) {
      return "1 lb bag " + name;
    }
    // Broccoli / cauliflower: sell as head or bag
    if (n.includes("broccoli") || n.includes("cauliflower")) {
      if ((unit === "cup" || unit === "cups") && qty >= 7) return "1 large head " + name;
      return "1 head " + name;
    }
    // Asparagus: sell by bunch
    if (n.includes("asparagus")) return "1 bunch asparagus";
    // Green beans: sell by lb bag
    if (n.includes("green bean")) return "1 lb bag green beans";
    // Bell pepper: sell individually
    if (n.includes("bell pepper")) {
      const count = unit === "cup" ? Math.ceil(qty / 1.5) : Math.ceil(qty);
      return count + " bell pepper" + (count !== 1 ? "s" : "");
    }
    // Zucchini: sell individually
    if (n.includes("zucchini")) {
      const count = unit === "cup" ? Math.ceil(qty / 1.5) : Math.ceil(qty);
      return count + " zucchini";
    }
    // Cherry / grape tomatoes: sell by pint
    if (n.includes("cherry tomato") || n.includes("grape tomato")) {
      return qty >= 4 ? "2 pints cherry tomatoes" : "1 pint cherry tomatoes";
    }
    // Regular tomatoes: sell individually
    if (n.includes("tomato")) {
      const count = unit === "cup" ? Math.ceil(qty / 0.75) : Math.ceil(qty);
      return count + " tomato" + (count !== 1 ? "es" : "");
    }
    // Cucumber: sell individually
    if (n.includes("cucumber")) return Math.max(1, Math.ceil(qty)) + " cucumber" + (Math.ceil(qty) > 1 ? "s" : "");
    // Onion: sell individually
    if (n.includes("onion") && !n.includes("green")) {
      const count = unit === "cup" ? Math.ceil(qty / 1.5) : Math.ceil(qty);
      return count + " onion" + (count !== 1 ? "s" : "");
    }
    // Garlic: sell by head
    if (n.includes("garlic")) return "1 head garlic";
    // Scallions / green onions: sell by bunch
    if (n.includes("scallion") || n.includes("green onion")) return "1 bunch scallions";
    // Carrots: sell by bag
    if (n.includes("carrot")) return "1 lb bag carrots";
    // Sweet potato: sell individually or bag
    if (n.includes("sweet potato")) {
      const cups = unit === "cup" ? qty : qty * 1.5;
      const count = Math.ceil(cups / 1.5); // ~1.5 cups per medium sweet potato
      return count <= 3 ? count + " medium sweet potato" + (count > 1 ? "es" : "") : "1 bag (3 lb) sweet potatoes";
    }
    // Avocado: sell individually
    if (n.includes("avocado")) {
      const count = unit === "cup" ? Math.ceil(qty / 0.5) : Math.ceil(qty);
      return Math.max(1, count) + " avocado" + (count > 1 ? "s" : "");
    }
    // Banana: sell by bunch
    if (n.includes("banana")) return "1 bunch bananas";
    // Lemon / lime: sell individually
    if (n.includes("lemon")) return Math.max(1, Math.ceil(qty)) + " lemon" + (Math.ceil(qty) > 1 ? "s" : "");
    if (n.includes("lime"))  return Math.max(1, Math.ceil(qty)) + " lime"  + (Math.ceil(qty) > 1 ? "s" : "");
    // Berries: sell by pint
    if (n.includes("berr") || n.includes("strawberr") || n.includes("blueberr") || n.includes("raspberry")) {
      const pints = Math.max(1, Math.ceil((unit === "cup" ? qty : qty) / 2));
      return pints + " pint" + (pints > 1 ? "s" : "") + " " + name;
    }
    // Pineapple: sell whole or pre-cut
    if (n.includes("pineapple")) return "1 container pre-cut pineapple";
    // Apple: sell individually or bag
    if (n.includes("apple")) return qty >= 5 ? "1 bag apples" : Math.ceil(qty) + " apple" + (Math.ceil(qty) > 1 ? "s" : "");
    // Fresh herbs: sell by bunch
    if (n.includes("basil") || n.includes("cilantro") || n.includes("dill") || n.includes("parsley") || n.includes("rosemary")) {
      return "1 bunch " + name;
    }

    // ═══════════════════════════════════════════════════════════════════════
    // DAIRY
    // ═══════════════════════════════════════════════════════════════════════
    if (n.includes("milk")) {
      const cups = unit === "cup" ? qty : qty / 8;
      if (cups >= 10) return "1 gallon milk";
      if (cups >= 5)  return "½ gallon milk";
      return "1 quart milk";
    }
    if (n.includes("greek yogurt") || (n.includes("yogurt") && !n.includes("yogurt sauce"))) {
      return qty * (unit === "cup" ? 8 : 1) >= 32 ? "2× 32oz tub Greek yogurt" : "1× 32oz tub Greek yogurt";
    }
    if (n.includes("cottage cheese")) {
      return "1× 16oz tub cottage cheese";
    }
    if (n.includes("butter") && !n.includes("almond") && !n.includes("peanut")) {
      return "1 stick butter";
    }
    if (n.includes("cheese") || n.includes("cheddar") || n.includes("parmesan") || n.includes("mozzarella") || n.includes("feta")) {
      const oz = unit === "oz" ? qty : qty * 4;
      if (oz <= 8) return "1× 8oz block/bag " + name;
      return Math.ceil(oz / 8) + "× 8oz " + name;
    }

    // ═══════════════════════════════════════════════════════════════════════
    // PROTEINS
    // ═══════════════════════════════════════════════════════════════════════
    if (n.includes("egg")) {
      const count = unit === "" ? qty : qty;
      return Math.ceil(count / 12) + " dozen eggs";
    }
    if (n.includes("chicken")) {
      const oz = unit === "oz" ? qty : qty * 16;
      return ceil2(oz / 16) + " lbs chicken breast";
    }
    if (n.includes("ground beef") || n.includes("ground turkey")) {
      const oz = unit === "oz" ? qty : qty * 16;
      return Math.ceil(oz / 16) + " lbs " + name;
    }
    if (n.includes("salmon") || n.includes("tilapia") || n.includes("cod") || n.includes("fillet")) {
      const oz = unit === "oz" ? qty : qty * 16;
      return ceil2(oz / 16) + " lbs " + name;
    }
    if (n.includes("steak") || n.includes("sirloin")) {
      const oz = unit === "oz" ? qty : qty * 16;
      return ceil2(oz / 16) + " lbs " + name;
    }
    if (n.includes("tuna")) {
      const oz = unit === "oz" ? qty : qty * 5;
      return Math.ceil(oz / 5) + "× 5oz cans tuna";
    }
    if (n.includes("protein powder") || n.includes("protein")) {
      return "1× 2lb tub protein powder";
    }
    if (n.includes("shrimp")) {
      const oz = unit === "oz" ? qty : qty * 16;
      return ceil2(oz / 16) + " lbs shrimp";
    }

    // ═══════════════════════════════════════════════════════════════════════
    // GRAINS, BREAD & PACKAGED
    // ═══════════════════════════════════════════════════════════════════════
    if (n.includes("oat")) return "1 canister oats (42 oz)";
    if (n.includes("rice") && !n.includes("rice cake")) {
      const oz = unit === "cup" ? qty * 7 : unit === "oz" ? qty : qty * 7;
      if (oz >= 48) return "5 lb bag rice";
      return "2 lb bag rice";
    }
    if (n.includes("quinoa")) {
      const oz = unit === "cup" ? qty * 8 : unit === "oz" ? qty : qty * 8;
      if (oz >= 32) return "2 lb bag quinoa";
      return "1 lb bag quinoa";
    }
    if (n.includes("pasta") || n.includes("penne") || n.includes("rigatoni") || n.includes("spaghetti")) {
      return "1 lb box pasta";
    }
    if (n.includes("bread") || n.includes("ezekiel")) return "1 loaf " + name;
    if (n.includes("wrap") || n.includes("tortilla")) return "1 pack wraps/tortillas";
    if (n.includes("cracker")) return "1 box " + name;
    if (n.includes("rice cake")) return "1 bag rice cakes";
    if (n.includes("granola")) return "1 bag granola";
    if (n.includes("black bean") || n.includes("chickpea") || n.includes("lentil")) {
      return qty >= 5 ? "2× 15oz cans " + name : "1× 15oz can " + name;
    }

    // ═══════════════════════════════════════════════════════════════════════
    // NUTS, BUTTERS & PANTRY
    // ═══════════════════════════════════════════════════════════════════════
    if (n.includes("almond butter") || n.includes("peanut butter")) {
      const oz = unit === "tbsp" ? qty * 0.5 : unit === "oz" ? qty : qty;
      return oz > 16 ? "2× 16oz jar " + name : "1× 16oz jar " + name;
    }
    if (n.includes("almond") || n.includes("walnut") || n.includes("cashew") || n.includes("pecan")) {
      return "1 bag " + name;
    }
    if (n.includes("chia") || n.includes("flax") || n.includes("hemp seed")) return "1 bag " + name;

    // ═══════════════════════════════════════════════════════════════════════
    // OILS, SAUCES & CONDIMENTS (tbsp)
    // ═══════════════════════════════════════════════════════════════════════
    if (n.includes("olive oil") || n.includes("coconut oil") || n.includes("avocado oil")) {
      return "1 bottle " + (n.includes("olive") ? "olive oil" : n.includes("coconut") ? "coconut oil" : "avocado oil");
    }
    if (n.includes("salsa"))     return "1 jar salsa";
    if (n.includes("hummus"))    return "1 tub hummus";
    if (n.includes("marinara") || (n.includes("pasta") && n.includes("sauce"))) return "1 jar marinara sauce";
    if (n.includes("soy sauce") || n.includes("soy")) return "1 bottle soy sauce";
    if (n.includes("hot sauce") || n.includes("sriracha")) return "1 bottle hot sauce";
    if (n.includes("honey"))     return "1 bottle honey";
    if (n.includes("mayo"))      return "1 jar mayo";
    if (n.includes("mustard"))   return "1 bottle mustard";
    if (n.includes("ketchup"))   return "1 bottle ketchup";
    if (n.includes("dressing") || n.includes("caesar")) return "1 bottle " + name;
    if (n.includes("vinegar"))   return "1 bottle vinegar";
    if (n.includes("salsa verde")) return "1 jar salsa verde";
    if (n.includes("guac"))      return "1 pack guacamole";
    if (n.includes("tzatziki"))  return "1 tub tzatziki";
    if (n.includes("pico"))      return "1 jar pico de gallo";

    // ═══════════════════════════════════════════════════════════════════════
    // SPICES (tsp) — just say 1 container
    // ═══════════════════════════════════════════════════════════════════════
    if (unit === "tsp" || n.includes("seasoning") || n.includes("cinnamon") || n.includes("cumin") || n.includes("paprika") || n.includes("chili powder")) {
      return "1 container " + name;
    }

    // ═══════════════════════════════════════════════════════════════════════
    // FALLBACK — make it human readable, never show raw cups
    // ═══════════════════════════════════════════════════════════════════════
    if (unit === "cup" || unit === "cups") {
      // Convert large cup amounts to something sensible
      if (qty >= 8)  return "1 large bag/container " + name;
      if (qty >= 4)  return "1 bag/container " + name;
      return "1 container " + name;
    }
    if (unit === "oz") {
      const oz = Math.ceil(qty);
      if (oz >= 32) return ceil2(oz/16) + " lbs " + name;
      return oz + " oz " + name;
    }
    if (unit === "lb") {
      return Math.ceil(qty * 2) / 2 + " lbs " + name;
    }
    if (!unit || unit === "") {
      const count = Math.ceil(qty);
      return count + " " + name;
    }
    return "1 container " + name;
  }

  // ── Category keywords ────────────────────────────────────────────────────────
  const CATS = [
    ["🥩 Proteins",        ["chicken","turkey","beef","salmon","tuna","steak","sirloin","egg","protein powder","cottage cheese","greek yogurt","ground turkey","ground beef","meatball","sausage","shrimp"]],
    ["🥦 Produce",         ["spinach","tomato","bell pepper","broccoli","asparagus","avocado","banana","sweet potato","zucchini","cucumber","lettuce","romaine","carrot","berry","berries","strawberr","blueberr","pineapple","apple","basil","cilantro","green bean","scallion","dill","lemon","lime","onion","garlic","kale"]],
    ["🧀 Dairy",           ["milk","cheese","parmesan","cheddar","yogurt","butter","cream","sour cream","tzatziki"]],
    ["🌾 Grains & Pantry", ["rice","oat","pasta","quinoa","bread","wrap","tortilla","cracker","granola","farro","penne","rigatoni","spaghetti","flour","rice cake","bean","black bean","lentil"]],
    ["🫙 Sauces & Staples",["oil","sauce","soy","salsa","hummus","mayo","honey","cinnamon","seasoning","sriracha","mustard","hot sauce","dressing","caesar","marinara","pico","guac","spice","pepper","salt","cumin","chili","paprika","rosemary","sesame","chia","almond butter","peanut butter","vinegar"]],
  ];
  const CAT_ORDER = CATS.map(c => c[0]);

  function categorize(name) {
    const low = name.toLowerCase();
    for (const [cat, keys] of CATS) {
      if (keys.some(k => low.includes(k))) return cat;
    }
    return "🛒 Other";
  }

  // ── Aggregate ingredients across all meals × 7 days ─────────────────────────
  // Key = normalized ingredient name (for dedup/summing)
  const agg = {}; // key → { displayName, qty, unit, cat, hasQty }

  activeMeals.forEach(meal => {
    if (!meal?.ingredients) return;
    meal.ingredients.forEach(raw => {
      // Skip pure seasoning/staple lines with no real quantity
      if (/^(salt|pepper|herbs|spices|to taste|as needed)/i.test(raw.trim())) {
        const cat = "🫙 Sauces & Staples";
        const key = raw.toLowerCase().replace(/[^a-z]/g,"").slice(0,20);
        if (!agg[key]) agg[key] = { displayName: raw.trim(), qty: null, unit: "", cat, hasQty: false };
        return;
      }

      const parsed = parseQty(raw);
      if (parsed) {
        const { qty, unit, name } = parsed;
        // Normalize name for grouping (strip cooking adjectives)
        const normName = name.toLowerCase()
          .replace(/\b(grilled|baked|cooked|roasted|sliced|mashed|diced|chopped|frozen|lean|whole|low-fat|non-fat|low-sodium|boneless|skinless|canned|drained|fresh)\b/g,"")
          .replace(/\s+/g," ").trim();
        const key = normName.replace(/[^a-z0-9 ]/g,"").slice(0,28);
        const scaled = qty * days;
        if (agg[key]) {
          // Only sum if same unit
          if (agg[key].unit === unit) {
            agg[key].qty += scaled;
          }
          // If unit mismatch, keep the first entry (edge case)
        } else {
          agg[key] = { displayName: name, qty: scaled, unit, cat: categorize(name), hasQty: true };
        }
      } else {
        // No parseable quantity — staple/misc item, show once
        const key = raw.toLowerCase().replace(/[^a-z]/g,"").slice(0,20);
        if (!agg[key]) agg[key] = { displayName: raw.trim(), qty: null, unit: "", cat: categorize(raw), hasQty: false };
      }
    });
  });

  // ── Group by category ────────────────────────────────────────────────────────
  const categorized = {};
  Object.values(agg).forEach(({ displayName, qty, unit, cat, hasQty }) => {
    if (!categorized[cat]) categorized[cat] = [];
    const label = hasQty ? toStoreUnit(qty, unit, displayName) : displayName;
    categorized[cat].push(label);
  });

  // Sort categories in logical shopping order
  const sorted = {};
  CAT_ORDER.forEach(cat => { if (categorized[cat]) sorted[cat] = categorized[cat]; });
  if (categorized["🛒 Other"]) sorted["🛒 Other"] = categorized["🛒 Other"];

  return sorted;
}

function groceryToText(categorized) {
  let t = `🛒 GROCERY LIST\n\n`;
  Object.entries(categorized).forEach(([cat, items]) => {
    t += `${cat}\n`;
    items.forEach(i => { t += `• ${i}\n`; });
    t += `\n`;
  });
  t += `— Health Fundamentals`;
  return t;
}
function calculateTDEE(w,ft,inch,a,gender,act) {
  const ww=parseFloat(w),fft=parseFloat(ft)||0,iinch=parseFloat(inch)||0,aa=parseFloat(a);
  if(!ww||(!fft&&!iinch)||!aa) return null;
  const heightCm = (fft * 12 + iinch) * 2.54;
  const bmr=gender==="male"?10*ww*0.453592+6.25*heightCm-5*aa+5:10*ww*0.453592+6.25*heightCm-5*aa-161;
  const mults={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very:1.9};
  return Math.round(bmr*(mults[act]||1.55));
}

// Compute deficit for cut based on BMI — heavier users get a more aggressive deficit
function getCutDeficit(w, ft, inch) {
  const heightCm = ((parseFloat(ft)||0) * 12 + (parseFloat(inch)||0)) * 2.54;
  const heightM  = heightCm / 100;
  const weightKg = parseFloat(w) * 0.453592;
  if (!heightM || !weightKg) return 400;
  const bmi = weightKg / (heightM * heightM);
  if (bmi >= 35) return 900;   // severely obese  → ~1.8 lb/week
  if (bmi >= 30) return 750;   // obese           → ~1.5 lb/week
  if (bmi >= 27) return 600;   // overweight      → ~1.2 lb/week
  return 400;                   // healthy/mild    → ~0.8 lb/week
}
function Toast({msg,show}){return <div className={`toast${show?" show":""}`}><span>✓</span> {msg}</div>;}

// ─── PLAN BUILDER ─────────────────────────────────────────────────────────────
function PlanBuilder({ onGenerate }) {
  const [step, setStep] = useState(0);
  const [prefs, setPrefs] = useState({
    // body stats
    gender: "", weight: "", feet: "", inches: "", age: "",
    // program
    level: "", goal: "", daysPerWeek: 0,
    selectedDays: [], cardioDays: [],
    cardioEnabled: false, cardioType: "",
    cardioFreq: 0, week: 1,
  });

  function p(k, v) { setPrefs(prev => ({ ...prev, [k]: v })); }

  const statsComplete = prefs.gender !== "" && prefs.weight !== "" && prefs.feet !== "" && prefs.age !== "";

  const canNext = [
    statsComplete,                                       // step 0: body stats
    prefs.level !== "",                                  // step 1: experience
    prefs.goal !== "",                                   // step 2: goal
    prefs.daysPerWeek > 0,                               // step 3: days per week
    prefs.selectedDays.length === prefs.daysPerWeek,     // step 4: which days
    true,                                                // step 5: cardio (always passable)
  ];

  function toggleDay(day) {
    const gymDays = prefs.selectedDays;
    const cardioDays = prefs.cardioDays;
    if (cardioDays.includes(day)) {
      setPrefs(prev => ({ ...prev, cardioDays: cardioDays.filter(d => d !== day) }));
      return;
    }
    if (gymDays.includes(day)) {
      setPrefs(prev => ({ ...prev, selectedDays: gymDays.filter(d => d !== day) }));
    } else if (gymDays.length < prefs.daysPerWeek) {
      setPrefs(prev => ({ ...prev, selectedDays: [...gymDays, day] }));
    }
  }

  const STEPS = [
    // Step 0 — body stats + gender
    <div key="s0">
      <div className="step-label">Step 1 of 6</div>
      <div className="step-title">Let's start with the basics.</div>

      {/* Gender selector */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>Gender</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[["male","Male 💪","Strength & muscle-focused program"],["female","Female 🍑","Glute, leg & toning-focused program"]].map(([val,label,sub])=>(
            <div key={val} className={`cardio-option${prefs.gender===val?" selected":""}`} onClick={()=>p("gender",val)} style={{textAlign:"center"}}>
              <div className="co-title">{label}</div>
              <div className="co-detail" style={{fontSize:"0.68rem"}}>{sub}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Stats row */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <div className="field">
          <span className="field-label">Weight (lbs)</span>
          <input className="field-input" type="number" placeholder="150" min="80" max="500" value={prefs.weight} onChange={e=>p("weight",e.target.value)}
                    onBlur={e=>{ const v=Number(e.target.value);
                      const el=e.target;
                      if(v&&(v<80||v>500)){ el.style.borderColor="var(--red)"; el.style.background="var(--rdim)"; }
                      else { el.style.borderColor=""; el.style.background=""; }
                    }}/>
        </div>
        <div className="field">
          <span className="field-label">Age</span>
          <input className="field-input" type="number" placeholder="28" min="16" max="80" value={prefs.age} onChange={e=>p("age",e.target.value)}
                    onBlur={e=>{ const v=Number(e.target.value);
                      const el=e.target;
                      if(v&&(v<16||v>80)){ el.style.borderColor="var(--red)"; el.style.background="var(--rdim)"; }
                      else { el.style.borderColor=""; el.style.background=""; }
                    }}/>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <div className="field">
          <span className="field-label">Height — Feet</span>
          <input className="field-input" type="number" placeholder="5" min="3" max="7" value={prefs.feet} onChange={e=>p("feet",e.target.value)}
                    onBlur={e=>{ const v=Number(e.target.value);
                      const el=e.target;
                      if(v&&(v<3||v>7)){ el.style.borderColor="var(--red)"; el.style.background="var(--rdim)"; }
                      else { el.style.borderColor=""; el.style.background=""; }
                    }}/>
        </div>
        <div className="field">
          <span className="field-label">Inches</span>
          <input className="field-input" type="number" placeholder="6" min="0" max="11" value={prefs.inches} onChange={e=>p("inches",e.target.value)}
                    onBlur={e=>{ const v=Number(e.target.value);
                      const el=e.target;
                      if(v<0||v>11){ el.style.borderColor="var(--red)"; el.style.background="var(--rdim)"; }
                      else { el.style.borderColor=""; el.style.background=""; }
                    }}/>
        </div>
      </div>

      {prefs.gender && (
        <div style={{marginTop:14,background:prefs.gender==="female"?"var(--pdim)":"var(--adim)",border:`1px solid ${prefs.gender==="female"?"var(--pborder)":"var(--aborder)"}`,borderRadius:"var(--r-sm)",padding:"10px 14px",fontSize:"0.78rem",color:"var(--text)",lineHeight:1.5}}>
          {prefs.gender==="female"
            ? "🍑 Your program will prioritize glutes, legs & core every session, with toning-focused upper body work."
            : "💪 Your program will balance strength across all muscle groups with progressive overload."}
        </div>
      )}
    </div>,

    // Step 1 — experience
    <div key="s1">
      <div className="step-label">Step 2 of 6</div>
      <div className="step-title">What's your training experience?</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {[["beginner","Beginner","New to lifting, or returning after a long break"],["intermediate","Intermediate","6+ months of consistent training"]].map(([val,label,sub])=>(
          <div key={val} className={`cardio-option${prefs.level===val?" selected":""}`} onClick={()=>p("level",val)}>
            <div className="co-title">{label}</div>
            <div className="co-detail">{sub}</div>
          </div>
        ))}

    </div>,

    // Step 2 — goal
    <div key="s2">
      <div className="step-label">Step 3 of 6</div>
      <div className="step-title">What's your primary goal?</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {[
          ["cut",    prefs.gender==="female"?"Lean Out 🔥":"Lose Fat 🔥",            prefs.gender==="female"?"Calorie deficit — lose fat, keep muscle tone":"Calorie deficit, preserve muscle"],
          ["maintain",prefs.gender==="female"?"Recomp & Tone ⚖️":"Body Recomposition ⚖️", prefs.gender==="female"?"Maintain weight, improve shape and definition":"Maintain weight, improve composition"],
          ["build",  prefs.gender==="female"?"Build & Sculpt 💪":"Build Muscle 💪",   prefs.gender==="female"?"Moderate surplus — grow glutes and legs, stay lean":"Calorie surplus, maximize growth"],
        ].map(([val,label,sub])=>(
          <div key={val} className={`cardio-option${prefs.goal===val?" selected":""}`} onClick={()=>p("goal",val)}>
            <div className="co-title">{label}</div>
            <div className="co-detail">{sub}</div>
          </div>
        ))}
      </div>
    </div>,

    // Step 3 — days per week
    <div key="s3">
      <div className="step-label">Step 4 of 6</div>
      <div className="step-title">How many days per week can you train?</div>
      <div className="pill-grid">
        {[2,3,4,5,6].map(n=>(
          <div key={n} className={`pill${prefs.daysPerWeek===n?" selected":""}`} onClick={()=>p("daysPerWeek",n)}>
            {n} days

      </div>
      {prefs.daysPerWeek > 0 && (
        <div className="days-note">
          {prefs.daysPerWeek <= 3 ? "Great for busy schedules. Full recovery between sessions." :

    // Step 4 — which days
    <div key="s4">
      <div className="step-label">Step 5 of 6</div>
      <div className="step-title">Which days work for you? ({prefs.selectedDays.length}/{prefs.daysPerWeek} selected)</div>
      <div className="day-grid">
        {DAYS.map(day => {
          const isGym = prefs.selectedDays.includes(day);
          const isCardio = prefs.cardioDays.includes(day);
          return (
            <div key={day}
              className={`day-pill${isGym?" selected":""}${isCardio?" cardio-day":""}`}
              onClick={()=>toggleDay(day)}>
              {day}

          );
        })}
      </div>
      <div className="days-note">Tap to select your gym days. Rest days assigned automatically.</div>
    </div>,

    // Step 5 — cardio
    <div key="s5">
      <div className="step-label">Step 6 of 6</div>
      <div className="step-title">Do you want to include cardio?</div>

      <div className={`cardio-toggle-row${prefs.cardioEnabled?" on":""}`}
        onClick={()=>p("cardioEnabled",!prefs.cardioEnabled)}>
        <div className="ctg-left">
          <div className="ctg-title">Include Cardio Sessions</div>
          <div className="ctg-sub">Adds cardio to your plan and adjusts calories</div>
        </div>
        <div className={`toggle-switch${prefs.cardioEnabled?" on":""}`}>
          <div className="toggle-knob"/>
        </div>
      </div>

      {prefs.cardioEnabled && (
        <>
          <div style={{marginTop:12,marginBottom:8,fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--orange)"}}>Choose Cardio Type</div>
          <div className="cardio-options">
            {CARDIO_TYPES.map(ct=>(
              <div key={ct.id} className={`cardio-option${prefs.cardioType===ct.id?" selected":""}`}
                onClick={()=>p("cardioType",ct.id)}>
                <div className="co-title">{ct.label}</div>
                <div className="co-detail">{ct.desc}</div>
                <div className="co-burn">{ct.burnNote}</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:14,marginBottom:8,fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--orange)"}}>Sessions Per Week</div>
          <div className="pill-grid">
            {[1,2,3].map(n=>(
              <div key={n} className={`pill${prefs.cardioFreq===n?" selected-orange selected":""}`}
                onClick={()=>p("cardioFreq",n)}>
                {n}×/week
              </div>
            ))}
          </div>
          {prefs.cardioType && prefs.cardioFreq > 0 && (
            <div style={{marginTop:12,background:"var(--odim)",border:"1px solid var(--oborder)",borderRadius:"var(--r-sm)",padding:"12px 14px"}}>
              <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--orange)",marginBottom:6}}>Calorie Impact</div>
              <div style={{fontSize:"0.82rem",color:"var(--text)",lineHeight:1.5}}>
                {prefs.cardioFreq}× {CARDIO_TYPES.find(c=>c.id===prefs.cardioType)?.label}/week
                = ~{(CARDIO_TYPES.find(c=>c.id===prefs.cardioType)?.burn||0)*prefs.cardioFreq} extra cal/week.
                <span style={{color:"var(--muted)"}}> Your meal plan will increase accordingly.</span>
              </div>
            </div>
          )}
        </>
      )}
    </div>,
  ];

  const isLastStep = step === STEPS.length - 1;

  return (
    <div>
      <div className="section-head">
        <span className="section-title">Build Your Plan</span>
        <span className="section-sub">Step {step+1} of {STEPS.length}</span>
      </div>

      {/* Progress bar */}
      <div style={{padding:"0 16px 16px",display:"flex",gap:6}}>
        {STEPS.map((_,i)=>(
          <div key={i} style={{flex:1,height:3,borderRadius:99,background:i<=step?"var(--accent)":"var(--s3)",transition:"background 0.3s"}}/>
        ))}
      </div>

      <div className="onboard-wrap">
        <div className="onboard-step">{STEPS[step]}</div>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          {step > 0 && (
            <button className="action-btn btn-secondary" style={{marginTop:0,flex:"0 0 80px"}} onClick={()=>setStep(s=>s-1)}>
              ← Back
            </button>
          )}
          <button
            className="generate-btn"
            style={{flex:1,marginTop:0,borderRadius:"var(--r-sm)",padding:13,fontSize:"0.82rem"}}
            disabled={!canNext[step]}
            onClick={()=>{
              if (isLastStep) onGenerate({...prefs, week:1});
              else setStep(s=>s+1);
            }}>
            {isLastStep ? "⚡ Generate My Plan" : "Continue →"}
          </button>
        </div>
      </div>
    </div>
  );
}

function WorkoutTab({ prefs, setPrefs, onRebuild }) {

  const [toast, setToast] = useState({show:false,msg:""});
  // swappedExercises: { "day-0-0": nextIndex } — keyed by dayIdx-exIdx
  const [swappedEx, setSwappedEx] = useState({});

  function swapExercise(dayId, exIdx, muscle, gender) {
    const pool = (EXERCISE_DB[gender||"male"]?.[muscle] || []);
    if (pool.length <= 1) { showToast("No other options for this muscle group"); return; }
    const key = dayId + "-" + exIdx;
    const curIdx = swappedEx[key] ?? exIdx;
    const nextIdx = (curIdx + 1) % pool.length;
    setSwappedEx(prev => ({...prev, [key]: nextIdx}));
    showToast("Swapped to: " + pool[nextIdx].name);
  }

  function getExercise(dayId, exIdx, originalEx, gender) {
    const key = dayId + "-" + exIdx;
    if (!(key in swappedEx)) return originalEx;
    const pool = (EXERCISE_DB[gender||"male"]?.[originalEx.muscle] || []);
    return pool[swappedEx[key]] || originalEx;
