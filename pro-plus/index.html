const SLOT_CONFIGS = {
  3: ["breakfast","lunch","dinner"],
  4: ["breakfast","lunch","snack","dinner"],
  5: ["breakfast","lunch","snack","preworkout","dinner"],
};
const SLOT_LABELS = {
  breakfast:"Breakfast", lunch:"Lunch", snack:"Snack",
  preworkout:"Pre-Workout", dinner:"Dinner",
};

function getAvailableMeals(goal, slot, avoidTags) {
  const pool = MEAL_POOL[goal]?.[slot] || [];
  const activeDiet = (typeof DIET_MODES !== "undefined")
    ? DIET_MODES.find(d => avoidTags.includes(d.id)) : null;
  const effectiveTags = activeDiet ? [...avoidTags, ...activeDiet.blocks] : avoidTags;
  if (activeDiet) {
    const filtered = pool.filter(m =>
      m.tags.includes(activeDiet.id) &&
      !m.tags.some(t => effectiveTags.filter(et => et !== activeDiet.id).includes(t))
    );
    return filtered.length > 0 ? filtered : pool.filter(m => !m.tags.some(t => effectiveTags.includes(t)));
  }
  return pool.filter(m => !m.tags.some(t => avoidTags.includes(t)));
}

function pickMealForWeek(goal, slot, avoidTags, weekNum, pinnedId) {
  const available = getAvailableMeals(goal, slot, avoidTags);
  if (!available.length) return null;
  if (pinnedId) {
    const pinned = available.find(m => m.id === pinnedId);
    if (pinned) return pinned;
  }
  return available[weekNum % available.length];
}

function PlanTab({ prefs, setPrefs, mealState, setMealState, setTab }) {
  const [activity,    setActivity]    = useState(prefs.activity || "moderate");
  const [goal,        setGoal]        = useState(prefs.goal    || "maintain");
  const [result,      setResult]      = useState(null);
  const resultRef = useRef(null);
  const [manual,      setManual]      = useState(null);
  const [copied,      setCopied]      = useState(false);
  const [insightOpen, setInsightOpen] = useState(true);
  const [statsOpen,   setStatsOpen]   = useState(false);
  const [toast,       setToast]       = useState({show:false, msg:""});

  // Restore persisted macros on mount
  const [hasMacros, setHasMacros] = useState(!!prefs.savedMacros);
  // Restore saved macros on mount — only run once
  const restoredRef = useRef(false);
  if (!restoredRef.current && prefs.savedMacros) {
    restoredRef.current = true;
    // Use the goal from prefs.goal (which is always current) not savedMacros.goal
    if (prefs.savedMacros.result) setResult(prefs.savedMacros.result);
    if (prefs.savedMacros.manual) setManual(prefs.savedMacros.manual);
    if (prefs.savedMacros.activity) setActivity(prefs.savedMacros.activity);
    // DON'T restore goal from savedMacros — use prefs.goal which is always live
  }

  const [editForm, setEditForm] = useState({
    weight: prefs.weight || "",
    feet:   prefs.feet   || "",
    inches: prefs.inches || "",
    age:    prefs.age    || "",
    gender: prefs.gender    || "male",
  });
  function ef(k, v) { setEditForm(p => ({...p, [k]: v})); }

  function saveStats() {
    setPrefs(p => ({...p, ...editForm}));
    setStatsOpen(false);
    setResult(null);
    setManual(null);
  }

  const ct = CARDIO_TYPES.find(c => c.id === prefs.cardioType);
  const cardioCalPerDay = prefs.cardioEnabled && ct && prefs.cardioFreq
    ? Math.round((ct.burn * prefs.cardioFreq) / 7) : 0;

  function calculate() {
    const tdee = calculateTDEE(prefs.weight, prefs.feet, prefs.inches, prefs.age, prefs.gender, activity);
    if (!tdee) return;
    const cutDef  = getCutDeficit(prefs.weight, prefs.feet, prefs.inches);
    const adj     = goal === "cut" ? Math.max(1400, tdee - cutDef) : goal === "build" ? tdee + 300 : tdee;
    const protein = Math.round(adj * 0.3 / 4);
    const fat     = Math.round(adj * 0.25 / 9);
    const carbs   = Math.round((adj - protein * 4 - fat * 9) / 4);
    const newResult = { tdee, calories: adj, protein, carbs, fat };
    const newManual = { protein, carbs, fat };
    setResult(newResult);
    setManual(newManual);
    // Persist so macros survive tab switching
    setPrefs(p => ({...p, goal, savedMacros: { result: newResult, manual: newManual, goal, activity }}));
    setTimeout(() => { if (resultRef.current) resultRef.current.scrollIntoView({ behavior:"smooth", block:"start" }); }, 80);
  }

  const dm = manual;
  const baseCals     = dm ? dm.protein * 4 + dm.carbs * 4 + dm.fat * 9 : 0;
  const adjustedCals = baseCals + cardioCalPerDay;
  const totalG = dm ? dm.protein + dm.carbs + dm.fat : 1;
  const pPct   = dm ? Math.round(dm.protein / totalG * 100) : 0;
  const cPct   = dm ? Math.round(dm.carbs   / totalG * 100) : 0;
  const fPct   = dm ? Math.round(dm.fat     / totalG * 100) : 0;

  function handleCopy() {
    if (!dm) return;
    const g = goal.charAt(0).toUpperCase() + goal.slice(1);
    let t = "📊 MY DAILY MACROS\nGoal: " + g + "\nBase Calories: " + baseCals + " kcal\nProtein: " + dm.protein + "g\nCarbs: " + dm.carbs + "g\nFat: " + dm.fat + "g";
    if (cardioCalPerDay > 0) t += "\n\nWith " + prefs.cardioFreq + "x " + (ct ? ct.label : "") + "/week:\nAdjusted Calories: " + adjustedCals + " kcal";
    t += "\n— Health Fundamentals";
    copyText(t);
    setCopied(true);
    setToast({ show: true, msg: "Macros copied!" });
    setTimeout(() => { setCopied(false); setToast({ show: false, msg: "" }); }, 2400);
  }

  const ACTIVITY_OPTIONS = [
    { id:"sedentary", label:"Sedentary",   sub:"No gym · desk job · under 3,000 steps/day" },
    { id:"light",     label:"Light",       sub:"Light movement · 3,000–6,000 steps/day" },
    { id:"moderate",  label:"Moderate",    sub:"Gym 3–5×/week · 6,000–10,000 steps/day" },
    { id:"active",    label:"Active",      sub:"Gym 6–7×/week · 10,000–15,000 steps/day" },
    { id:"very",      label:"Very Active", sub:"Physical job + training · 15,000+ steps/day" },
  ];

  const STRATEGIES = {
    cut: {
      color:"var(--accent)", header:"🔥 Cutting — How to Use Your Macros",
      tip:"2-week check-in: If the scale hasn't moved, drop 20–25g carbs before cutting total calories.",
      macros:[
        { color:"var(--accent)", label:"Protein — Keep it High",      body:"Never cut protein. It protects muscle in a deficit — without it your body burns muscle not fat. Hit this every day even if you miss everything else." },
        { color:"var(--orange)", label:"Carbs — Cut These First",      body:"Carbs drive insulin, the fat-storage hormone. Lower carbs = lower insulin = more time in fat-burning mode. When fat loss stalls, drop carbs 20–30g first." },
        { color:"var(--blue)",   label:"Fat — Keep it Moderate",       body:"Fat supports testosterone, which protects muscle during a cut. It also slows digestion keeping you fuller and reducing cravings." },
      ]
    },
    build: {
      color:"var(--orange)", header:"💪 Building — How to Use Your Macros",
      tip:"Lean bulk: Gaining more than 1–1.5 lbs/week means excess fat. Pull back carbs 30–40g first.",
      macros:[
        { color:"var(--accent)", label:"Protein — The Foundation",          body:"0.8–1g per lb of bodyweight. Without enough, extra calories become fat not muscle. More than 1g/lb adds cost, not muscle." },
        { color:"var(--orange)", label:"Carbs — Your Primary Fuel",         body:"Fuel your sessions and spike insulin post-workout to drive nutrients into muscle. Stack carbs around training." },
        { color:"var(--blue)",   label:"Fat — Raise It, Don't Overdo It",   body:"Supports testosterone, joints, and hormones. Helps hit your surplus but don't let it crowd out carbs." },
      ]
    },
    maintain: {
      color:"var(--blue)", header:"⚖️ Maintaining — How to Use Your Macros",
      tip:"Recomp is slow — expect 1–2 lbs of change per month. The scale barely moves but composition shifts.",
      macros:[
        { color:"var(--accent)", label:"Protein — Keep it Elevated",    body:"High protein drives recomposition even at maintenance. Your body can build muscle and burn fat simultaneously." },
        { color:"var(--orange)", label:"Carbs — Match Your Output",      body:"More on training days for performance, less on rest days. This natural cycle supports muscle without fat gain." },
        { color:"var(--blue)",   label:"Fat — Steady and Consistent",    body:"Keep fat stable. Supports hormone balance. If energy crashes or performance dips, fat is usually too low." },
      ]
    }
  };
  const strat = STRATEGIES[goal] || STRATEGIES.maintain;

  const heightStr  = prefs.feet ? (prefs.feet + "'" + (prefs.inches || 0) + '"') : "—";
  const statsChips = [
    { label:"Weight", val: prefs.weight ? prefs.weight + " lbs" : "—" },
    { label:"Height", val: heightStr },
    { label:"Age",    val: prefs.age    ? prefs.age + " yrs"    : "—" },
    { label:"Gender",    val: prefs.gender    ? prefs.gender.charAt(0).toUpperCase() + prefs.gender.slice(1) : "—" },
  ];

  return (
    <div>
      <div className="section-head">
        <span className="section-title">My Plan</span>
      </div>

      {/* ── Stats summary + ⚙️ Edit ──────────────────────────── */}
      <div style={{padding:"0 16px 14px"}}>
        <div style={{background:"var(--s1)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"10px 12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--muted)"}}>Your Stats</span>
            <button onClick={()=>setStatsOpen(true)} style={{background:"var(--s2)",border:"1px solid var(--border)",borderRadius:"var(--r-xs)",padding:"4px 9px",cursor:"pointer",fontSize:"0.65rem",fontWeight:700,color:"var(--muted)",display:"flex",alignItems:"center",gap:4}}>
              ⚙️ Edit
            </button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:5}}>
            {statsChips.map(c => (
              <div key={c.label} style={{textAlign:"center",background:"var(--s2)",borderRadius:"var(--r-xs)",padding:"6px 4px"}}>
                <div style={{fontSize:"0.8rem",fontWeight:800,fontFamily:"var(--ff-mono)",color:"var(--text)"}}>{c.val}</div>
                <div style={{fontSize:"0.56rem",color:"var(--muted)",marginTop:2,textTransform:"uppercase",letterSpacing:"0.06em"}}>{c.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Goal pills ── */}
      <div style={{padding:"0 16px 16px"}}>
        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:10}}>Goal</div>
        <div className="goal-pills">
          {[["cut","Cut 🔥"],["maintain","Maintain ⚖️"],["build","Build 💪"]].map(([g,l]) => (
            <button key={g} className={"goal-pill" + (goal === g ? " active" : "")}
              onClick={() => { setGoal(g); setResult(null); setManual(null); setPrefs(p => ({...p, goal: g, savedMacros: p.savedMacros ? {...p.savedMacros, goal: g} : p.savedMacros})); }}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* ── Activity Level — FOCAL SELECTOR ── */}
      <div style={{padding:"0 16px 16px"}}>
        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:4}}>Activity Level</div>
        <div style={{fontSize:"0.72rem",color:"var(--orange)",background:"var(--odim)",border:"1px solid var(--oborder)",borderRadius:"var(--r-xs)",padding:"7px 10px",marginBottom:10,lineHeight:1.5}}>⚠️ Choose your <strong>current</strong> level — not your goal. If you don't currently work out, pick Sedentary or Light.</div>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {ACTIVITY_OPTIONS.map(opt => (
            <button key={opt.id}
              onClick={() => { setActivity(opt.id); setResult(null); setManual(null); }}
              style={{
                background: activity === opt.id ? "var(--adim)" : "var(--s1)",
                border: "1px solid " + (activity === opt.id ? "var(--aborder)" : "var(--border)"),
                borderRadius:"var(--r-sm)", padding:"11px 14px", cursor:"pointer",
                textAlign:"left", transition:"border-color 0.15s, background 0.15s",
              }}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontSize:"0.88rem",fontWeight:700,color: activity === opt.id ? "var(--accent)" : "var(--text)",marginBottom:2}}>{opt.label}</div>
                  <div style={{fontSize:"0.7rem",color:"var(--muted)",lineHeight:1.4}}>{opt.sub}</div>
                </div>
                <div style={{width:18,height:18,borderRadius:"50%",border:"2px solid " + (activity === opt.id ? "var(--accent)" : "var(--border)"),background: activity === opt.id ? "var(--accent)" : "transparent",flexShrink:0,marginLeft:12,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {activity === opt.id && <div style={{width:7,height:7,borderRadius:"50%",background:"var(--bg)"}}/>}
                </div>
              </div>
            </button>
          ))}
        </div>
      </div>

      {/* ── Calculate button ── */}
      <div style={{padding:"0 16px 4px"}}>
        <button className="action-btn btn-primary" style={{marginTop:0}} onClick={calculate}>
          Calculate My Macros
        </button>
      </div>

      {/* ── Results ── */}
      {result && dm && (
        <div style={{padding:"0 16px"}}>
          <div className="result-strip" ref={resultRef}>
            <div style={{fontSize:"0.6rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>
              TDEE&nbsp;<span style={{color:"var(--text)"}}>{result.tdee}</span>&nbsp;cal · {goal === "cut" ? `−${getCutDeficit(prefs.weight, prefs.feet, prefs.inches)} deficit` : goal === "build" ? "+300 surplus" : "Maintenance"}
            </div>

            <div className="result-cals">
              <span className="result-cal-num">{baseCals}</span>
              <span className="result-cal-label">base cal / day</span>
            </div>

            {/* Macro tiles — large, clear, editable */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
              {[["Protein","protein","var(--accent)"],["Carbs","carbs","var(--orange)"],["Fat","fat","var(--blue)"]].map(([label,key,color]) => (
                <div key={key} style={{background:"var(--s2)",border:"1px solid " + color + "33",borderRadius:"var(--r-sm)",padding:"10px 6px",textAlign:"center"}}>
                  <input type="number" value={manual[key]}
                    onChange={e => setManual(m => ({...m, [key]: Number(e.target.value)}))}
                    style={{background:"transparent",border:"none",outline:"none",textAlign:"center",
                      fontFamily:"var(--ff-mono)",fontSize:"1.4rem",fontWeight:800,color:color,width:"100%",padding:0}}/>
                  <div style={{fontSize:"0.62rem",fontWeight:700,color:"var(--muted)",marginTop:2,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</div>
                  <div style={{fontSize:"0.6rem",color:color,marginTop:3,opacity:0.75}}>{key === "fat" ? manual[key] * 9 : manual[key] * 4} kcal</div>
                </div>
              ))}
            </div>

            {/* Macro ratio bar */}
            <div className="macro-bar-row">
              <div className="mbar-p" style={{width:pPct + "%"}}/>
              <div className="mbar-c" style={{width:cPct + "%"}}/>
              <div className="mbar-f" style={{width:fPct + "%"}}/>
            </div>
            <div className="macro-legend">
              {[["var(--accent)","Protein",pPct],["var(--orange)","Carbs",cPct],["var(--blue)","Fat",fPct]].map(([c,l,p]) => (
                <div key={l} className="legend-item"><div className="legend-dot" style={{background:c}}/>{l}&nbsp;{p}%</div>
              ))}
            </div>

            {/* Cardio adjustment */}
            {prefs.cardioEnabled && ct && prefs.cardioFreq > 0 && (
              <div className="cardio-impact">
                <div className="ci-title">🏃 Cardio Adjustment — {prefs.cardioFreq}× {ct.label}/week</div>
                <div className="ci-row"><span className="ci-label">Extra burn/day (avg)</span><span className="ci-val">+{cardioCalPerDay} cal</span></div>
                <div className="ci-row" style={{marginBottom:0}}><span className="ci-label">Adjusted daily total</span><span className="ci-val" style={{fontSize:"0.95rem",fontWeight:700}}>{adjustedCals} cal</span></div>
                <div className="ci-note">On cardio days add ~{cardioCalPerDay} cal from carbs (+{Math.round(cardioCalPerDay / 4)}g).</div>
              </div>
            )}

            {/* Macro strategy accordion */}
            {/* ── How to Use Macros — featured section ── */}
            <div style={{
              marginBottom:14,
              background:"var(--s1)",
              border:`2px solid ${strat.color}`,
              borderRadius:"var(--r-sm)",
              overflow:"hidden",
            }}>
              {/* Header row — tappable to collapse */}
              <button onClick={()=>setInsightOpen(o=>!o)} style={{
                width:"100%",background:"none",border:"none",padding:"13px 15px",cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"space-between",
              }}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:strat.color,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{fontSize:"0.85rem",filter:"brightness(0)"}}>💡</span>
                  </div>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:strat.color,marginBottom:1}}>
                      Read This First
                    </div>
                    <div style={{fontSize:"0.82rem",fontWeight:700,color:"var(--text)",lineHeight:1.2}}>How to use your macros</div>
                  </div>
                </div>
                <span style={{fontSize:"0.75rem",color:"var(--muted)",transform:insightOpen?"rotate(180deg)":"none",transition:"transform 0.2s",display:"inline-block"}}>▾</span>
              </button>

              {insightOpen && (
                <div style={{padding:"0 15px 15px"}}>
                  <div style={{width:"100%",height:1,background:"var(--border)",marginBottom:12}}/>
                  <div style={{fontSize:"0.8rem",color:"var(--text)",lineHeight:1.65,marginBottom:12}}>{strat.intro}</div>
                  <div style={{display:"grid",gap:10,marginBottom:12}}>
                    {strat.macros.map(function(m,i){ return (
                      <div key={i} style={{
                        background:"var(--s2)",borderRadius:"var(--r-xs)",
                        borderLeft:"3px solid "+m.color,padding:"10px 12px",
                      }}>
                        <div style={{fontSize:"0.76rem",fontWeight:800,color:m.color,marginBottom:4}}>{m.label}</div>
                        <div style={{fontSize:"0.76rem",color:"var(--muted)",lineHeight:1.65}}>{m.body}</div>
                      </div>
                    );})}
                  </div>
                  <div style={{
                    background:`color-mix(in srgb, ${strat.color} 10%, var(--s2))`,
                    border:`1px solid color-mix(in srgb, ${strat.color} 30%, transparent)`,
                    borderRadius:"var(--r-xs)",padding:"10px 13px",
                    display:"flex",gap:8,alignItems:"flex-start",
                  }}>
                    <span style={{fontSize:"1rem",flexShrink:0}}>📌</span>
                    <div style={{fontSize:"0.76rem",color:"var(--text)",lineHeight:1.55}}>
                      <strong>{strat.tip}</strong>
                    </div>
                  </div>
                </div>
              )}
            </div>

            <button className={"action-btn" + (copied ? " btn-saved" : " btn-secondary")} onClick={handleCopy}>
              {copied ? "✓ Copied!" : "📋 Copy Macros to Notes"}
            </button>

            {/* Meal Plan CTA — opens dedicated meals tab */}
            <button className="action-btn btn-primary" style={{marginTop:10}} onClick={() => setTab("meals")}>
              Show My Weekly Meal Plan →
            </button>

            <div className="calc-note">Starting points — not rigid rules. Adjust ±50 cal after 2 weeks. Macro fields above are editable.</div>
          </div>
        </div>
      )}

      {/* ── Edit Stats Modal ── */}
      {statsOpen && (
        <div className="week-modal-bg" onClick={() => setStatsOpen(false)}>
          <div className="week-modal" onClick={e => e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div className="wm-title" style={{marginBottom:0}}>Edit Your Stats</div>
              <button onClick={() => setStatsOpen(false)} style={{background:"none",border:"none",fontSize:"1.2rem",cursor:"pointer",color:"var(--muted)"}}>✕</button>
            </div>
            <div className="form-row">
              <div className="field">
                <span className="field-label">Weight (lbs)</span>
                <input className="field-input" type="number" placeholder="150" min="80" max="500" value={editForm.weight}
                  onChange={e=>ef("weight",e.target.value)}
                    onBlur={e=>{ const v=Number(e.target.value);
                      const el=e.target;
                      if(v&&(v<80||v>500)){ el.style.borderColor="var(--red)"; el.style.background="var(--rdim)"; }
                      else { el.style.borderColor=""; el.style.background=""; }
                    }}/>
              </div>
              <div className="field">
                <span className="field-label">Age</span>
                <input className="field-input" type="number" placeholder="28" min="16" max="80" value={editForm.age}
                  onChange={e=>ef("age",e.target.value)}
                    onBlur={e=>{ const v=Number(e.target.value);
                      const el=e.target;
                      if(v&&(v<16||v>80)){ el.style.borderColor="var(--red)"; el.style.background="var(--rdim)"; }
                      else { el.style.borderColor=""; el.style.background=""; }
                    }}/>
              </div>
            </div>
            <div className="form-row">
              <div className="field">
                <span className="field-label">Height — Feet</span>
                <input className="field-input" type="number" placeholder="5" min="3" max="7" value={editForm.feet}
                  onChange={e=>ef("feet",e.target.value)}
                    onBlur={e=>{ const v=Number(e.target.value);
                      const el=e.target;
                      if(v&&(v<3||v>7)){ el.style.borderColor="var(--red)"; el.style.background="var(--rdim)"; }
                      else { el.style.borderColor=""; el.style.background=""; }
                    }}/>
              </div>
              <div className="field">
                <span className="field-label">Inches</span>
                <input className="field-input" type="number" placeholder="6" min="0" max="11" value={editForm.inches}
                  onChange={e=>ef("inches",e.target.value)}
                    onBlur={e=>{ const v=Number(e.target.value);
                      const el=e.target;
                      if(v<0||v>11){ el.style.borderColor="var(--red)"; el.style.background="var(--rdim)"; }
                      else { el.style.borderColor=""; el.style.background=""; }
                    }}/>
              </div>
            </div>
            <div className="field" style={{marginBottom:16}}>
              <span className="field-label">Gender</span>
              <select className="field-select" value={editForm.gender} onChange={e => ef("gender", e.target.value)}>
                <option value="male">Male</option>
                <option value="female">Female</option>
              </select>
            </div>
            <button className="action-btn btn-primary" style={{marginTop:0}} onClick={saveStats}>Save Changes</button>
          </div>
        </div>
      )}

      <Toast msg={toast.msg} show={toast.show}/>
    </div>
  );
}

// ─── MEALS TAB ───────────────────────────────────────────────────────────────

function MealsTab({ prefs, mealState, setMealState, goal, setTab }) {
  const [week,       setWeek]       = useState(prefs.week || 1);
  const [openId,     setOpenId]     = useState(null);
  const [saved,      setSaved]      = useState({});
  const [configOpen, setConfigOpen] = useState(false);
  const [toast,      setToast]      = useState({show:false, msg:""});

  const { mealCount, pinned, avoidTags } = mealState || { mealCount:4, pinned:{}, avoidTags:[] };
  const setMealCount = v  => setMealState(s => ({...s, mealCount: v}));
  const setPinned    = fn => setMealState(s => ({...s, pinned: typeof fn === "function" ? fn(s.pinned) : fn}));
  const setAvoidTags = fn => setMealState(s => ({...s, avoidTags: typeof fn === "function" ? fn(s.avoidTags) : fn}));
  // swapped = temporary slot overrides (not pinned — reset on week change)
  const [swapped, setSwapped] = useState({});
  const [showCheatMeal, setShowCheatMeal] = useState(false);

  const ct = CARDIO_TYPES.find(c => c.id === prefs.cardioType);
  const activeSlots = SLOT_CONFIGS[mealCount];
  const activeMeals = useMemo(() => {
    return activeSlots.map(slot => {
      const pinnedId  = pinned[slot];
      const swappedId = swapped[slot];
      return pickMealForWeek(goal, slot, avoidTags, week - 1, pinnedId || swappedId);
    }).filter(Boolean);
  }, [goal, week, mealCount, avoidTags, pinned, swapped]);

  const rawCals = activeMeals.reduce((s,m) => s + m.calories, 0);
  const cardioAdj = prefs.cardioEnabled && ct && prefs.cardioFreq ? Math.round(ct.burn * prefs.cardioFreq / 7) : 0;
  const goalForMeals = goal || prefs.goal || "maintain";

  // Use saved calculator result when available — this is the EXACT number the user calculated.
  // Only recompute from scratch if no saved macros exist yet.
  // This ensures the meal plan always matches whatever the macro calculator showed.
  const savedCals = prefs.savedMacros?.result?.calories;
  const savedGoal = prefs.savedMacros?.goal;

  let targetCalsRaw;
  if (savedCals && savedGoal === goalForMeals) {
    // Saved macros match current goal — use exact calculator result
    targetCalsRaw = savedCals;
  } else {
    // No saved macros or goal changed — recompute using same formula as calculator
    const tdeeForMeals = calculateTDEE(prefs.weight, prefs.feet, prefs.inches, prefs.age, prefs.gender,
      prefs.savedMacros?.activity || prefs.activity || "moderate");
    const cutDef = getCutDeficit(prefs.weight, prefs.feet, prefs.inches);
    targetCalsRaw = tdeeForMeals
      ? (goalForMeals==="cut" ? Math.max(1400, tdeeForMeals - cutDef)
       : goalForMeals==="build" ? tdeeForMeals + 300
       : tdeeForMeals)
      : 0;
  }

  const targetCalsTotal = targetCalsRaw + cardioAdj;

  // Scale each meal proportionally to hit the target. Capped 0.75–1.55x for realism.
  const scaleFactor = (targetCalsRaw && rawCals > 0)
    ? Math.min(1.55, Math.max(0.75, targetCalsTotal / Math.max(rawCals + cardioAdj, 1)))
    : 1;

  // Scaled meals for display — does not mutate the meal pool
  const scaledMeals = activeMeals.map(m => ({
    ...m,
    protein:  Math.round(m.protein  * scaleFactor),
    carbs:    Math.round(m.carbs    * scaleFactor),
    fat:      Math.round(m.fat      * scaleFactor),
    calories: Math.round(m.calories * scaleFactor),
  }));

  const totalCals = scaledMeals.reduce((s,m) => s + m.calories, 0);
  const totalP    = scaledMeals.reduce((s,m) => s + m.protein,  0);
  const totalC    = scaledMeals.reduce((s,m) => s + m.carbs,    0);
  const totalF    = scaledMeals.reduce((s,m) => s + m.fat,      0);
  const adjCals   = totalCals + cardioAdj;

  function showToast(msg) { setToast({show:true,msg}); setTimeout(() => setToast({show:false,msg:""}), 2400); }
  function handleSave(m, e) { e.stopPropagation(); copyText(mealToText(m)); setSaved(s => ({...s, [m.id]:true})); showToast("Copied — paste into Notes!"); }

  function togglePin(meal) {
    setPinned(prev => {
      const already = prev[meal.slot] === meal.id;
      if (already) { const n = {...prev}; delete n[meal.slot]; return n; }
      return {...prev, [meal.slot]: meal.id};
    });
  }

  function toggleAvoid(tagId) {
    setAvoidTags(prev => {
      const next = prev.includes(tagId) ? prev.filter(t => t !== tagId) : [...prev, tagId];
      activeSlots.forEach(slot => {
        if (pinned[slot]) {
          const still = getAvailableMeals(goal, slot, next).find(m => m.id === pinned[slot]);
          if (!still) setPinned(p => { const n = {...p}; delete n[slot]; return n; });
        }
      });
      return next;
    });
  }

  function swapMeal(meal) {
    const available = getAvailableMeals(goal, meal.slot, avoidTags);
    if (available.length <= 1) { showToast("No other options — try adjusting food prefs"); return; }
    const cur  = available.findIndex(m => m.id === meal.id);
    const next = available[(cur + 1) % available.length];
    setSwapped(prev => ({...prev, [meal.slot]: next.id}));
    setOpenId(null);
    showToast("Swapped to: " + next.name);
  }

  const goalLabel = goal === "cut" ? "Cut 🔥" : goal === "build" ? "Build 💪" : "Maintain ⚖️";

  return (
    <div>
      <div className="section-head" style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingRight:16}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span className="section-title">Meal Plan</span>
          <span className="section-sub" style={{color:"var(--accent)",fontWeight:700}}>{goalLabel}</span>
        </div>
        {setTab && (
          <button onClick={()=>setTab("plan")}
            style={{background:"var(--s2)",border:"1px solid var(--border)",borderRadius:"var(--r-xs)",padding:"5px 10px",cursor:"pointer",fontSize:"0.68rem",fontWeight:700,color:"var(--muted)",display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
            ← Plan
          </button>
        )}
      </div>

      {/* Meals per day */}
      <div style={{padding:"0 16px 12px"}}>
        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>Meals per day</div>
        <div style={{display:"flex",gap:6}}>
          {[[3,"3 meals","B · L · D"],[4,"4 meals","+ Snack"],[5,"5 meals","+ Pre-WO"]].map(([count,label,sub]) => (
            <button key={count} onClick={() => { setMealCount(count); setOpenId(null); setSaved({}); }}
              style={{flex:1,background: mealCount === count ? "var(--adim)" : "var(--s2)",
                border:"1px solid " + (mealCount === count ? "var(--aborder)" : "var(--border)"),
                borderRadius:"var(--r-sm)",padding:"10px 6px",cursor:"pointer",textAlign:"center"}}>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:"0.88rem",fontWeight:800,color: mealCount === count ? "var(--accent)" : "var(--text)"}}>{label}</div>
              <div style={{fontSize:"0.6rem",color:"var(--muted)",marginTop:2}}>{sub}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Week selector */}
      <div style={{padding:"0 16px 12px"}}>
        <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>
          Week — rotates automatically unless pinned ❤️
        </div>
        <div style={{display:"flex",gap:6}}>
          {[1,2,3,4].map(w => (
            <button key={w} className={"day-tab" + (week === w ? " active" : "")} onClick={() => { setWeek(w); setOpenId(null); }}>Wk {w}</button>
          ))}
        </div>
      </div>

      {/* Daily totals vs calculator targets */}
      {(()=>{
        // Recalculate targets from prefs so they always match the calculator
        const tdee = calculateTDEE(prefs.weight, prefs.feet, prefs.inches, prefs.age, prefs.gender, prefs.activity || "moderate");
        const hasTDEE = !!tdee;
        const goalKey = goal || prefs.goal || "maintain";
        // Use saved calculator result when it matches current goal — exact same as calculator showed
        const _savedC = prefs.savedMacros?.result?.calories;
        const _savedG = prefs.savedMacros?.goal;
        let targetCals;
        if (_savedC && _savedG === goalKey) {
          targetCals = _savedC;
        } else {
          const _cutDef = getCutDeficit(prefs.weight, prefs.feet, prefs.inches);
          targetCals = hasTDEE ? (goalKey==="cut" ? Math.max(1400, tdee - _cutDef) : goalKey==="build" ? tdee+300 : tdee) : 0;
        }
        const targetP = hasTDEE ? Math.round(targetCals*0.30/4) : 0;
        const targetF = hasTDEE ? Math.round(targetCals*0.25/9) : 0;
        const targetC = hasTDEE ? Math.round((targetCals - targetP*4 - targetF*9)/4) : 0;
        const targetCalsFinal = hasTDEE ? targetCals + cardioAdj : 0;

        const macros = [
          {label:"Protein", meal:totalP, target:targetP, color:"var(--accent)"},
          {label:"Carbs",   meal:totalC, target:targetC, color:"var(--orange)"},
          {label:"Fat",     meal:totalF, target:targetF, color:"var(--blue)"},
        ];

        return (
          <div style={{padding:"0 16px 12px"}}>
            <div style={{background:"var(--s1)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"12px 14px"}}>

              {/* Calorie row */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:hasTDEE?8:10}}>
                <span style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--muted)"}}>
                  Meal Calories
                </span>
                <div style={{textAlign:"right"}}>
                  <span style={{fontSize:"0.95rem",fontWeight:800,color:"var(--accent)",fontFamily:"var(--ff-mono)"}}>{adjCals}</span>
                  {hasTDEE && <span style={{fontSize:"0.72rem",color:"var(--muted)",fontFamily:"var(--ff-mono)"}}> / {targetCalsFinal} target</span>}
                  <span style={{fontSize:"0.62rem",color:"var(--muted)",marginLeft:4}}>kcal</span>
                </div>
              </div>

              {/* Calorie progress bar */}
              {hasTDEE && (()=>{
                const pct = Math.min(100, Math.round(adjCals / targetCalsFinal * 100));
                const diff = adjCals - targetCalsFinal;
                const onTarget = Math.abs(diff) <= 150;
                const barColor = onTarget ? "var(--accent)" : Math.abs(diff) <= 350 ? "var(--orange)" : "var(--red)";
                return (
                  <div style={{marginBottom:12}}>
                    <div style={{height:5,background:"var(--s2)",borderRadius:99,overflow:"hidden",marginBottom:4}}>
                      <div style={{height:"100%",width:pct+"%",background:barColor,borderRadius:99,transition:"width 0.4s"}}/>
                    </div>
                    <div style={{fontSize:"0.68rem",color:onTarget?"var(--accent)":Math.abs(diff)<=350?"var(--orange)":"var(--muted)",textAlign:"right"}}>
                      {onTarget ? "✓ On target" : diff > 0 ? `+${diff} cal over` : `${Math.abs(diff)} cal under target`}
                    </div>
                  </div>
                );
              })()}

              {/* Macro grid — meal vs target */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {macros.map(({label,meal,target,color}) => {
                  const diff = meal - target;
                  const onTarget = !hasTDEE || Math.abs(diff) <= 15;
                  return (
                    <div key={label} style={{background:"var(--s2)",borderRadius:"var(--r-xs)",padding:"8px 10px",textAlign:"center"}}>
                      <div style={{fontSize:"1.1rem",fontWeight:800,fontFamily:"var(--ff-mono)",color:color}}>{meal}g</div>
                      {hasTDEE && (
                        <div style={{fontSize:"0.6rem",color:onTarget?"var(--accent)":Math.abs(diff)<=25?"var(--orange)":"var(--muted)",marginTop:1,fontFamily:"var(--ff-mono)"}}>
                          {onTarget ? "✓" : (diff>0?"+":"")+diff+"g"} / {target}g
                        </div>
                      )}
                      <div style={{fontSize:"0.62rem",color:"var(--muted)",marginTop:2}}>{label}</div>
                    </div>
                  );
                })}
              </div>

              {!hasTDEE && (
                <div style={{marginTop:8,fontSize:"0.7rem",color:"var(--muted)",textAlign:"center"}}>
                  Run the macro calculator to see targets
                </div>
              )}
            </div>
          </div>
        );
      })()}


      {/* ── Water Reminder ── */}
      {(()=>{
        const w = Number(prefs.weight)||180;
        const actMult = {sedentary:1.0,light:1.1,moderate:1.15,active:1.2,very:1.25}[prefs.activity||"moderate"]||1.15;
        const base = Math.round(w * 0.5 * actMult);
        const cardioBonus = (prefs.cardioEnabled&&prefs.cardioFreq)? Math.round((prefs.cardioFreq/7)*12):0;
        const total = base + cardioBonus;
        const cups = (total/8).toFixed(1);
        const bottles = (total/16.9).toFixed(1);
        return (
          <div style={{padding:"0 16px 16px"}}>
            <div style={{
              background:"linear-gradient(135deg,rgba(93,184,254,0.12) 0%,rgba(93,184,254,0.04) 100%)",
              border:"1px solid rgba(93,184,254,0.35)",
              borderRadius:"var(--r-sm)",padding:"13px 15px",
              display:"flex",gap:12,alignItems:"flex-start",
            }}>
              <span style={{fontSize:"1.5rem",flexShrink:0}}>💧</span>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
                  <div style={{fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--blue)"}}>
                    Daily Water Target
                  </div>
                  <div style={{fontFamily:"var(--ff-mono)",fontSize:"1.1rem",fontWeight:800,color:"var(--blue)"}}>
                    {total} oz
                  </div>
                </div>
                <div style={{fontSize:"0.78rem",color:"var(--text)",fontWeight:700,marginBottom:4}}>
                  ≈ {cups} cups &nbsp;·&nbsp; {bottles} standard bottles
                </div>
                <div style={{fontSize:"0.72rem",color:"var(--muted)",lineHeight:1.55}}>
                  Based on your {w}lb body weight{prefs.cardioEnabled&&cardioBonus>0?` + ${cardioBonus}oz for cardio`:""}. Sip consistently — don't wait until thirsty.
                  {prefs.gender==="female"?" Women: aim for the lower end of this range.":" Men: aim for the full target, especially on training days."}
                </div>
              </div>
            </div>
          </div>
        );
      })()}
      {/* Food prefs button */}
      <div style={{padding:"0 16px 8px",display:"flex",justifyContent:"flex-end"}}>
        <button onClick={() => setConfigOpen(true)} style={{
          background: avoidTags.length > 0 ? "var(--odim)" : "var(--s2)",
          border:"1px solid " + (avoidTags.length > 0 ? "var(--oborder)" : "var(--border)"),
          borderRadius:"var(--r-sm)",padding:"7px 12px",cursor:"pointer",
          fontSize:"0.7rem",fontWeight:700,color: avoidTags.length > 0 ? "var(--orange)" : "var(--muted)",
          display:"flex",alignItems:"center",gap:5,
        }}>
          ⚙️ {avoidTags.length > 0 ? (avoidTags.length + " filter" + (avoidTags.length > 1 ? "s" : "")) : "Food Prefs"}
        </button>
      </div>

      {/* Meal cards */}
      <div className="card-stack">
        {scaledMeals.map(m => {
          const isOpen   = openId === m.id;
          const isPinned = pinned[m.slot] === m.id;
          const hasAlts  = getAvailableMeals(goal, m.slot, avoidTags).length > 1;
          return (
            <div key={m.id} className={"card clickable" + (isOpen ? " open-orange" : "")}
              style={isPinned ? {borderColor:"var(--pborder)"} : {}}
              onClick={() => setOpenId(isOpen ? null : m.id)}>
              <div className="card-top">
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                    <div className="meal-time">{m.time}</div>
                    {isPinned && <span style={{fontSize:"0.65rem",color:"var(--purple)",background:"var(--pdim)",border:"1px solid var(--pborder)",borderRadius:99,padding:"1px 7px",fontWeight:700}}>❤️ Pinned</span>}
                  </div>
                  <div className="card-title">{m.name}</div>
                  <div className="meal-macro-row">
                    {[["Pro",m.protein],["Carb",m.carbs],["Fat",m.fat]].map(([l,v],i) => (
                      <span key={l} style={{display:"flex",alignItems:"center"}}>
                        {i > 0 && <div className="mac-sep"/>}
                        <div className="meal-macro"><span className="meal-macro-val">{v}g</span><span className="meal-macro-lbl">{l}</span></div>
                      </span>
                    ))}
                    <div className="mac-sep"/>
                    <div className="meal-macro"><span className="meal-macro-val">{m.calories}</span><span className="meal-macro-lbl">kcal</span></div>
                  </div>
                </div>
                <span className={"chevron" + (isOpen ? " open" : "")}>▾</span>
              </div>
              {isOpen && (
                <div className="card-detail">
                  <ul className="ingredient-list">{m.ingredients.map((ing,i) => <li key={i}>{ing}</li>)}</ul>
                  <div className="prep-note">🍳 {m.prep}</div>
                  {prefs.cardioEnabled && ct && (
                    <div className="cardio-meal-note">🏃 On {ct.label} days, add an extra carb serving to offset the ~{ct.burn} cal burn.</div>
                  )}
                  <div style={{display:"flex",gap:8,marginTop:12}}>
                    <button onClick={e => { e.stopPropagation(); togglePin(m); showToast(isPinned ? "Unpinned — will rotate again" : "Pinned ❤️ — stays on all weeks"); }}
                      style={{flex:1,background: isPinned ? "var(--pdim)" : "var(--s2)",border:"1px solid " + (isPinned ? "var(--pborder)" : "var(--border)"),borderRadius:"var(--r-xs)",padding:"10px 6px",fontSize:"0.72rem",fontWeight:700,color: isPinned ? "var(--purple)" : "var(--muted)",cursor:"pointer"}}>
                      {isPinned ? "❤️ Unpin" : "🤍 Pin"}
                    </button>
                    {hasAlts && (
                      <button onClick={e => { e.stopPropagation(); swapMeal(m); }}
                        style={{flex:1,background:"var(--s2)",border:"1px solid var(--border)",borderRadius:"var(--r-xs)",padding:"10px 6px",fontSize:"0.72rem",fontWeight:700,color:"var(--muted)",cursor:"pointer"}}>
                        🔄 Swap
                      </button>
                    )}
                    <button className={"action-btn" + (saved[m.id] ? " btn-saved" : " btn-primary")}
                      style={{flex:1,marginTop:0,padding:"10px 6px",fontSize:"0.72rem"}}
                      onClick={e => handleSave(m, e)}>
                      {saved[m.id] ? "✓ Copied" : "📋 Copy"}
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Cheat Meal Mode — functional in pro-plus */}
      <div style={{margin:"20px 16px 8px"}}>
        <button
          onClick={()=>setShowCheatMeal(true)}
          style={{
            width:"100%",background:"var(--s1)",border:"1px solid var(--border)",
            borderRadius:"var(--r)",padding:"16px",cursor:"pointer",
            display:"flex",alignItems:"center",gap:14,textAlign:"left",
            transition:"border-color 0.15s",
          }}
          onMouseEnter={e=>e.currentTarget.style.borderColor="var(--oborder)"}
          onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}
        >
          <span style={{fontSize:"1.8rem",flexShrink:0}}>🍕</span>
          <div style={{flex:1}}>
            <div style={{fontFamily:"var(--ff-display)",fontSize:"0.95rem",fontWeight:800,color:"var(--text)",marginBottom:3}}>Cheat Meal Mode</div>
            <div style={{fontSize:"0.75rem",color:"var(--muted)",lineHeight:1.4}}>Cravings happen. Plan around it — we'll adjust your next workout to offset.</div>
          </div>
          <span style={{color:"var(--orange)",fontSize:"0.82rem",fontWeight:700,flexShrink:0}}>Activate →</span>
        </button>
      </div>
      {showCheatMeal && <CheatMealModal onClose={()=>setShowCheatMeal(false)}/>}

      {/* Food Prefs Modal */}
      {configOpen && (
        <div className="week-modal-bg" onClick={() => setConfigOpen(false)}>
          <div className="week-modal" style={{maxHeight:"86vh",overflowY:"auto"}} onClick={e => e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div className="wm-title" style={{marginBottom:0}}>Food Preferences</div>
              <button onClick={() => setConfigOpen(false)} style={{background:"none",border:"none",fontSize:"1.2rem",cursor:"pointer",color:"var(--muted)"}}>✕</button>
            </div>
            <div style={{fontSize:"0.76rem",color:"var(--muted)",lineHeight:1.5,marginBottom:14}}>Set your diet style, flag allergies, or exclude foods you dislike.</div>

            {/* Diet Style */}
            <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--accent)",marginBottom:10}}>🌱 Diet Style</div>
            <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:18}}>
              {DIET_MODES.map(dm => {
                const on = avoidTags.includes(dm.id);
                return (
                  <button key={dm.id} onClick={() => {
                    setAvoidTags(prev => {
                      const withoutDiets = prev.filter(t => !DIET_MODES.map(d => d.id).includes(t));
                      return on ? withoutDiets : [...withoutDiets, dm.id];
                    });
                  }} style={{background: on ? "var(--adim)" : "var(--s2)",border:"1px solid " + (on ? "var(--aborder)" : "var(--border)"),borderRadius:"var(--r-sm)",padding:"11px 14px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:"1.2rem"}}>{dm.emoji}</span>
                      <div>
                        <div style={{fontSize:"0.85rem",fontWeight:700,color: on ? "var(--accent)" : "var(--text)"}}>{dm.label}</div>
                        <div style={{fontSize:"0.7rem",color:"var(--muted)",marginTop:1}}>{dm.desc} · meal plan updates automatically</div>
                      </div>
                    </div>
                    <div style={{width:18,height:18,borderRadius:"50%",border:"2px solid " + (on ? "var(--accent)" : "var(--border)"),background: on ? "var(--accent)" : "transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      {on && <div style={{width:7,height:7,borderRadius:"50%",background:"var(--bg)"}}/>}
                    </div>
                  </button>
                );
              })}
              <button onClick={() => setAvoidTags(prev => prev.filter(t => !DIET_MODES.map(d => d.id).includes(t)))}
                style={{background:"var(--s1)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"10px 14px",cursor:"pointer",fontSize:"0.72rem",fontWeight:700,color:"var(--muted)",textAlign:"left"}}>
                🍖 No Restriction — show all meals
              </button>
            </div>

            {/* Allergies */}
            <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--red)",marginBottom:10}}>⚠️ Allergies</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:18}}>
              {FOOD_PREFS_CONFIG.filter(f => ["gluten","dairy","eggs","fish","shellfish","nuts","peanuts","soy"].includes(f.id)).map(fp => {
                const on = avoidTags.includes(fp.id);
                return (
                  <button key={fp.id} onClick={() => toggleAvoid(fp.id)} style={{background: on ? "var(--rdim)" : "var(--s2)",border:"1px solid " + (on ? "var(--rborder)" : "var(--border)"),borderRadius:99,padding:"7px 13px",cursor:"pointer",fontSize:"0.75rem",fontWeight:700,color: on ? "var(--red)" : "var(--muted)",display:"flex",alignItems:"center",gap:5}}>
                    {fp.emoji} {fp.label}{on && <span style={{fontSize:"0.7rem"}}>✕</span>}
                  </button>
                );
              })}
            </div>

            {/* Dislikes */}
            <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:10}}>🚫 I Don't Like</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
              {FOOD_PREFS_CONFIG.filter(f => ["beef","pork","chicken","turkey","oats","banana","spicy","cottage"].includes(f.id)).map(fp => {
                const on = avoidTags.includes(fp.id);
                return (
                  <button key={fp.id} onClick={() => toggleAvoid(fp.id)} style={{background: on ? "var(--odim)" : "var(--s2)",border:"1px solid " + (on ? "var(--oborder)" : "var(--border)"),borderRadius:99,padding:"7px 13px",cursor:"pointer",fontSize:"0.75rem",fontWeight:700,color: on ? "var(--orange)" : "var(--muted)",display:"flex",alignItems:"center",gap:5}}>
                    {fp.emoji} {fp.label}{on && <span style={{fontSize:"0.7rem"}}>✕</span>}
                  </button>
                );
              })}
            </div>

            {avoidTags.length > 0 && (
              <div style={{background:"var(--s2)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"11px 13px",marginBottom:14,fontSize:"0.78rem",color:"var(--text)",lineHeight:1.5}}>
                <strong style={{color:"var(--accent)"}}>{avoidTags.length} preference{avoidTags.length > 1 ? "s" : ""} active</strong> — meal plan updates automatically.
              </div>
            )}
            <button className="action-btn btn-primary" style={{marginTop:0}} onClick={() => setConfigOpen(false)}>Done</button>
            {avoidTags.length > 0 && <button className="action-btn btn-secondary" style={{marginTop:8}} onClick={() => setAvoidTags([])}>Clear All</button>}
          </div>
        </div>
      )}

      <Toast msg={toast.msg} show={toast.show}/>
    </div>
  );
}


// ─── GROCERY TAB ──────────────────────────────────────────────────────────────
function GroceryTab({ prefs, mealState }) {
  const [generated, setGenerated]   = useState(false);
  const [checked,   setChecked]     = useState({});
  const [copied,    setCopied]      = useState(false);
  const [toast,     setToast]       = useState({show:false,msg:""});
  const [shopWeek,  setShopWeek]    = useState(prefs.week || 1);

  // ── Derive active meals for the selected shopping week ────────────────────
  const activeMeals = useMemo(() => {
    const goal   = prefs.goal || "maintain";
    const mCount = (mealState && mealState.mealCount) || 4;
    const pins   = (mealState && mealState.pinned)    || {};
    const blocked= (mealState && mealState.avoidTags) || [];

    const slots = SLOT_CONFIGS[mCount] || SLOT_CONFIGS[4];

    return slots.map(slot => {
      return pickMealForWeek(goal, slot, blocked, shopWeek - 1, pins[slot]);
    }).filter(Boolean);
  }, [prefs, mealState, shopWeek]);

  const DAYS = 7;
  const categorized = useMemo(() => buildGroceryFromMeals(activeMeals, DAYS), [activeMeals]);

  const allKeys = Object.entries(categorized).flatMap(([cat,items]) =>
    items.map(i => `${cat}::${i}`)
  );
  const checkedCount = Object.values(checked).filter(Boolean).length;
  const progress     = allKeys.length > 0 ? checkedCount / allKeys.length : 0;
  const mealNames    = activeMeals.map(m => m.name);

  function handleCopy() {
    copyText(groceryToText(categorized));
    setCopied(true);
    setToast({show:true, msg:"List copied — paste into Notes!"});
    setTimeout(() => { setCopied(false); setToast({show:false,msg:""}); }, 2400);
  }

  function handleReset() {
    setChecked({});
    setGenerated(false);
  }

  return (
    <div>
      <div className="section-head">
        <span className="section-title">Grocery List</span>
        <span className="section-sub">{generated ? `${checkedCount}/${allKeys.length}` : "7-day"}</span>
      </div>

      <div style={{padding:"0 16px"}}>

        {/* Week selector */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>
            Shopping for which week?
          </div>
          <div style={{display:"flex",gap:6}}>
            {[1,2,3,4].map(w=>(
              <button key={w}

// ── Top-level Sparkline (not nested) ────────────────────────────────────────
function ProgressSparkline({ points, minW, maxW, startWeight }) {
  const range = (maxW - minW) || 1;
  const pad = 8, W = 304, H = 84;
  if (!points || points.length < 2) return null;
  const xs = points.map((_,i) => pad + (i / (points.length - 1)) * W);
  const ys = points.map(p => pad + H - ((p - minW) / range) * H);
  const d    = xs.map((x,i) => (i===0?"M":"L")+x+","+ys[i]).join(" ");
  const fill = d + " L"+xs[xs.length-1]+","+(pad+H)+" L"+xs[0]+","+(pad+H)+" Z";
  const goalY = pad + H - ((startWeight - minW) / range) * H;
  return (
    <svg width="100%" viewBox={"0 0 320 100"} style={{overflow:"visible"}}>
      <path d={fill} fill="var(--accent)" fillOpacity="0.08"/>
      <path d={d} fill="none" stroke="var(--accent)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {startWeight > 0 && goalY > pad && goalY < pad+H && (
        <line x1={pad} y1={goalY} x2={pad+W} y2={goalY}
          stroke="var(--muted)" strokeWidth="1" strokeDasharray="4 3" opacity="0.5"/>
      )}
      <circle cx={xs[xs.length-1]} cy={ys[ys.length-1]} r="4"
        fill="var(--accent)" stroke="var(--bg)" strokeWidth="2"/>
    </svg>
  );
}

function ProgressTab({ prefs }) {
  const startWeight   = (prefs && prefs.weight) ? prefs.weight : 0;
  const [data, setData]             = useState(loadProgress);
  const [inputVal, setInputVal]     = useState("");
  const [view, setView]             = useState("month");
  const [showShare, setShowShare]   = useState(false);
  const [showCheat, setShowCheat]   = useState(false);
  const [toast, setToast]           = useState({ show: false, msg: "" });

  const today = formatDate(new Date());
  const entries        = (data && data.entries) ? data.entries : [];
  const todayEntry     = entries.find(function(e){ return e.date === today; });
  const checkinStreak  = (data && data.streaks && data.streaks.checkin) ? data.streaks.checkin : 0;

  const filtered = useMemo(function() {
    const now = new Date();
    const cutoff = new Date();
    if (view === "week")  cutoff.setDate(now.getDate() - 6);
    if (view === "month") cutoff.setDate(now.getDate() - 29);
    if (view === "year")  cutoff.setFullYear(now.getFullYear() - 1);
    return entries
      .filter(function(e){ return parseDate(e.date) >= cutoff; })
      .sort(function(a,b){ return a.date.localeCompare(b.date); });
  }, [entries, view]);

  const minW  = filtered.length ? Math.min.apply(null, filtered.map(function(e){return e.weight;})) : (startWeight > 5 ? startWeight - 5 : 0);
  const maxW  = filtered.length ? Math.max.apply(null, filtered.map(function(e){return e.weight;})) : startWeight + 5;
  const firstW = filtered.length ? filtered[0].weight : null;
  const lastW  = filtered.length ? filtered[filtered.length-1].weight : null;
  const totalChange = (firstW != null && lastW != null) ? (lastW - firstW) : null;
  const avgW = filtered.length ? (filtered.reduce(function(s,e){return s+e.weight;}, 0) / filtered.length).toFixed(1) : null;

  function logWeight() {
    const val = parseFloat(inputVal);
    if (isNaN(val) || val < 50 || val > 600) { showToastMsg("Enter a valid weight (50–600 lbs)"); return; }
    const newEntry   = { date: today, weight: val };
    const existing   = entries.filter(function(e){ return e.date !== today; });
    const newEntries = existing.concat([newEntry]).sort(function(a,b){ return a.date.localeCompare(b.date); });
    const yesterday  = formatDate(new Date(Date.now() - 86400000));
    const lastCheckin = data.streaks ? data.streaks.lastCheckin : null;
    let streak = (data.streaks && data.streaks.checkin) ? data.streaks.checkin : 0;
    if (lastCheckin === yesterday) { streak = streak + 1; }
    else if (lastCheckin === today) { /* unchanged */ }
    else { streak = 1; }
    const newData = { entries: newEntries, streaks: { checkin: streak, lastCheckin: today } };
    setData(newData);
    saveProgress(newData);
    setInputVal("");
    showToastMsg(todayEntry ? "Weight updated!" : "Logged! Keep it up");
  }

  function deleteEntry(date) {
    const newEntries = entries.filter(function(e){ return e.date !== date; });
    const newData = { entries: newEntries, streaks: data.streaks };
    setData(newData);
    saveProgress(newData);
  }

  function showToastMsg(msg) {
    setToast({ show: true, msg: msg });
    setTimeout(function(){ setToast({ show: false, msg: "" }); }, 2500);
  }

  return (
    <div className="tab-content">
      {toast.show && (
        <div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",
          background:"var(--accent)",color:"#0a0b08",borderRadius:99,padding:"8px 20px",

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>

          {label:"Current",   value: lastW ? lastW+" lbs" : "—",  color:"var(--text)"},
          {label:"Change",    value: totalChange != null ? (totalChange>0?"+":"")+totalChange.toFixed(1)+" lbs" : "—",
           color: totalChange != null ? (totalChange < 0 ? "var(--accent)" : "var(--orange)") : "var(--text)"},

                textTransform:"uppercase",marginBottom:4}}>{s.label}</div>

            </div>

      {filtered.length > 1 ? (

          padding:"16px",marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

          <div style={{display:"flex",justifyContent:"space-between",paddingLeft:44,marginTop:4,fontSize:"0.6rem",color:"var(--muted)"}}>

            {[

// ─── WEEK TRACKING ────────────────────────────────────────────────────────────
// Auto-advances week based on real calendar days since install.
// Stores installDate in prefs (set once on first launch).
function getAutoWeek(installDateStr, maxWeeks) {
  if (!installDateStr) return 1;
  const installed = new Date(installDateStr);
  const now = new Date();
  const daysSince = Math.floor((now - installed) / (1000 * 60 * 60 * 24));
  const week = Math.min(Math.floor(daysSince / 7) + 1, maxWeeks || 4);
  return Math.max(1, week);
}

        <div style={{background:"var(--s2)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}
          onClick={()=>{ onDismiss(); setTab("workout"); }}>
          <div style={{width:36,height:36,borderRadius:8,background:"var(--odim)",border:"1px solid var(--oborder)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>🏋️</div>
          <div style={{flex:1}}>
            <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--orange)",marginBottom:2}}>Week {week} Workouts</div>
            <div style={{fontSize:"0.82rem",fontWeight:700,color:"var(--text)"}}>See This Week's Training</div>
          </div>
          <span style={{color:"var(--muted)",fontSize:"0.8rem"}}>→</span>
        </div>

        {/* Priority 3 — Meal Prep */}
        <div style={{background:"var(--s2)",border:"1px solid var(--border)",borderRadius:"var(--r-sm)",padding:"12px 14px",marginBottom:20,display:"flex",alignItems:"center",gap:12,cursor:"pointer"}}
          onClick={()=>{ onDismiss(); setTab("meals"); }}>
          <div style={{width:36,height:36,borderRadius:8,background:"var(--bdim)",border:"1px solid var(--bborder)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>🍽️</div>
          <div style={{flex:1}}>
            <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--blue)",marginBottom:2}}>Meal Prep</div>
            <div style={{fontSize:"0.82rem",fontWeight:700,color:"var(--text)"}}>This Week's Meal Plan</div>
          </div>
          <span style={{color:"var(--muted)",fontSize:"0.8rem"}}>→</span>
        </div>

        <button className="action-btn btn-primary" onClick={onDismiss}>
          Let's Go — Week {week} 💪
        </button>
      </div>
    </div>
  );
}


function HomeTab({ prefs, setPrefs, setTab }) {
  const weekInfo = WEEK_PROGRESSIONS[prefs.week-1] || WEEK_PROGRESSIONS[0];
  const ct = CARDIO_TYPES.find(c=>c.id===prefs.cardioType);
  const [cardioOpen, setCardioOpen] = useState(false);
  const [showBriefing, setShowBriefing] = useState(false);
  function p(k,v){ setPrefs(prev=>({...prev,[k]:v})); }

  // On mount: set installDate if not set, auto-advance week, show briefing if new week
  const initRef = useRef(false);
  if (!initRef.current) {
    initRef.current = true;
    const maxWeeks = 4; // pro has 4 weeks; pro-plus has 12
    const now = new Date().toISOString().split("T")[0];
    let needsUpdate = {};

    // Set install date on first ever launch
    if (!prefs.installDate) {
      needsUpdate.installDate = now;
      needsUpdate.lastBriefingWeek = 0; // force briefing to show
    }

    // Auto-advance week based on real days
    const autoWeek = getAutoWeek(prefs.installDate || now, maxWeeks);
    if (autoWeek !== prefs.week) {
      needsUpdate.week = autoWeek;
    }

    // Determine if we should show briefing (new week not yet seen)
    const effectiveWeek = autoWeek || prefs.week || 1;
    const shouldShow = effectiveWeek !== prefs.lastBriefingWeek;

    if (Object.keys(needsUpdate).length > 0) {
      setTimeout(() => setPrefs(p => ({...p, ...needsUpdate})), 0);
    }
    if (shouldShow) {
      setTimeout(() => {
        setShowBriefing(true);
        setPrefs(p => ({...p, lastBriefingWeek: effectiveWeek}));
      }, 400);
    }
  }

  // Get the first lesson for this week's briefing priority
  // Get first lesson from LearnTab data if available
  const LEARN_LESSONS_REF = typeof LEARN_CONTENT !== "undefined" ? LEARN_CONTENT : null;
  const firstLesson = (LEARN_LESSONS_REF && LEARN_LESSONS_REF[0]) ? {icon: LEARN_LESSONS_REF[0].icon||"🔥", number:"01", title:LEARN_LESSONS_REF[0].title||"What Is a Calorie?"} : { icon:"🔥", number:"01", title:"What Is a Calorie?" };
  return (
    <div>
      {showBriefing && (
        <WeeklyBriefing
          prefs={prefs}
          onDismiss={()=>setShowBriefing(false)}
          setTab={setTab}
          currentLesson={firstLesson}
        />
      )}
      <div className="hero">
        <div className="hero-eyebrow">Week {prefs.week} · {weekInfo.name} · {prefs.level.charAt(0).toUpperCase()+prefs.level.slice(1)}</div>
        <div className="hero-title">{prefs.goal==="cut"?"Burn Fat. Keep Muscle.":prefs.goal==="build"?"Build. Eat. Repeat.":"Train Smart. Stay Consistent."}</div>
        <div className="hero-sub">{weekInfo.intensityNote}</div>
      </div>
      <div className="section-head" style={{paddingBottom:6}}><span className="section-title">Your Plan</span></div>
      <div style={{padding:"0 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
        {[
          {icon:"🏋️",label:"This Week's Workouts",tab:"workout"},
          {icon:"📊",label:"Macro Calculator",tab:"plan"},
          {icon:"🍽️",label:"Meal Prep Guide",tab:"plan"},
          {icon:"🛒",label:"Grocery List",tab:"grocery"},
          {icon:"📚",label:"Nutrition Lessons",tab:"learn"},
        ].map(item=>(
          <div key={item.tab+item.label} style={{background:"var(--s1)",border:"1px solid var(--border)",borderRadius:"var(--r)",padding:"16px 14px",cursor:"pointer"}} onClick={()=>setTab(item.tab)}>
            <div style={{fontSize:"1.4rem",marginBottom:6}}>{item.icon}</div>
            <div style={{fontSize:"0.78rem",fontWeight:700,color:"var(--text)",lineHeight:1.3}}>{item.label}</div>
          </div>
        ))}
        <div style={{background:prefs.cardioEnabled?"var(--odim)":"var(--s1)",border:`1px solid ${prefs.cardioEnabled?"var(--oborder)":"var(--border)"}`,borderRadius:"var(--r)",padding:"16px 14px",cursor:"pointer"}} onClick={()=>setCardioOpen(true)}>
          <div style={{fontSize:"1.4rem",marginBottom:6}}>🏃</div>
          <div style={{fontSize:"0.78rem",fontWeight:700,color:prefs.cardioEnabled?"var(--orange)":"var(--text)",lineHeight:1.3}}>
            {prefs.cardioEnabled&&ct?`${ct.label} · ${prefs.cardioFreq}×/wk`:"Add Cardio"}
          </div>
        </div>
        <div style={{background:"var(--adim)",border:"1px solid var(--aborder)",borderRadius:"var(--r)",padding:"16px 14px",cursor:"pointer",gridColumn:"span 2"}} onClick={()=>setShowBriefing(true)}>
          <div style={{fontSize:"1.4rem",marginBottom:6}}>📋</div>
          <div style={{fontSize:"0.78rem",fontWeight:700,color:"var(--accent)",lineHeight:1.3}}>Week {prefs.week} Briefing & Priorities</div>
        </div>
      </div>
      <div className="section-head" style={{paddingBottom:6}}><span className="section-title">This Week</span></div>
      <div className="card-stack" style={{paddingBottom:16}}>
        {[
          {tag:"tag-g",label:"Training",text:weekInfo.intensityNote},
          {tag:"tag-o",label:"Nutrition",text:`Goal: ${prefs.goal}. ${prefs.goal==="cut"?"Eat in a moderate deficit. Protein protects your muscle.":prefs.goal==="build"?"Eat in a moderate surplus. Don't skip carbs — they fuel your sessions.":"Maintenance calories. Body recomp takes patience and consistency."}`},
          prefs.cardioEnabled&&ct&&{tag:"tag-o",label:"Cardio",text:`${prefs.cardioFreq}× ${ct.label}/week. On cardio days, add ~${ct.burn} extra calories from carbs to compensate for the burn.`},
        ].filter(Boolean).map((c,i)=>(
          <div key={i} className="card">
            <div className="tags"><span className={`tag ${c.tag}`}>{c.label}</span></div>
            <div className="card-desc" style={{color:"var(--text)",fontSize:"0.82rem"}}>{c.text}</div>
          </div>
        ))}
      </div>

      {cardioOpen && (
        <div className="week-modal-bg" onClick={()=>setCardioOpen(false)}>
          <div className="week-modal" style={{maxHeight:"85vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div className="wm-title" style={{marginBottom:0}}>Cardio Settings</div>
              <button onClick={()=>setCardioOpen(false)} style={{background:"none",border:"none",fontSize:"1.2rem",cursor:"pointer",color:"var(--muted)"}}>✕</button>
            </div>
            <div className={`cardio-toggle-row${prefs.cardioEnabled?" on":""}`} onClick={()=>p("cardioEnabled",!prefs.cardioEnabled)}>
              <div className="ctg-left">
                <div className="ctg-title">Include Cardio</div>
                <div className="ctg-sub">Adjusts calorie targets on cardio days</div>
              </div>
              <div className={`toggle-switch${prefs.cardioEnabled?" on":""}`}><div className="toggle-knob"/></div>
            </div>
            {prefs.cardioEnabled && (
              <>
                <div style={{marginTop:14,marginBottom:8,fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--orange)"}}>Cardio Type</div>
                <div className="cardio-options">
                  {CARDIO_TYPES.map(ctype=>(
                    <div key={ctype.id} className={`cardio-option${prefs.cardioType===ctype.id?" selected":""}`} onClick={()=>p("cardioType",ctype.id)}>
                      <div className="co-title">{ctype.label}</div>
                      <div className="co-detail">{ctype.desc}</div>
                      <div className="co-burn">{ctype.burnNote}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginTop:14,marginBottom:8,fontSize:"0.65rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--orange)"}}>Sessions Per Week</div>
                <div className="pill-grid">
                  {[1,2,3].map(n=>(
                    <div key={n} className={`pill${prefs.cardioFreq===n?" selected-orange selected":""}`} onClick={()=>p("cardioFreq",n)}>{n}×/week</div>
                  ))}
                </div>
                {prefs.cardioType&&prefs.cardioFreq>0&&(
                  <div style={{marginTop:12,background:"var(--odim)",border:"1px solid var(--oborder)",borderRadius:"var(--r-sm)",padding:"12px 14px"}}>
                    <div style={{fontSize:"0.62rem",fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"var(--orange)",marginBottom:6}}>Calorie Impact</div>
                    <div style={{fontSize:"0.82rem",color:"var(--text)",lineHeight:1.5}}>
                      {prefs.cardioFreq}× {CARDIO_TYPES.find(c=>c.id===prefs.cardioType)?.label}/week = ~{(CARDIO_TYPES.find(c=>c.id===prefs.cardioType)?.burn||0)*prefs.cardioFreq} extra cal/week.
                    </div>
                  </div>
                )}
              </>
            )}
            <button className="action-btn btn-primary" style={{marginTop:16}} onClick={()=>setCardioOpen(false)}>Save ✓</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("home");
  const [prefs, setPrefs] = useState(null); // null = not yet built

  // Shared meal state — lifted so GroceryTab can read what MealsTab has selected
  const [mealState, setMealState] = useState({ mealCount:4, pinned:{}, avoidTags:[] });

  const NAV = [
    {id:"home",     icon:"🏠", label:"Home"},
    {id:"workout",  icon:"🏋️", label:"Train"},
    {id:"plan",     icon:"📋", label:"Plan"},
    {id:"grocery",  icon:"🛒", label:"Grocery"},
    {id:"progress", icon:"📈", label:"Progress"},
    {id:"learn",    icon:"📚", label:"Learn"},
  ];

  if (!prefs) {
    return (
      <>
        <style>{STYLE}</style>
        <div className="app">
          <div className="top-bar">
            <div className="brand">Health<em>Fund</em></div>
            <div className="access-badge">Full Access</div>
          </div>
          <PlanBuilder onGenerate={(p)=>{ setPrefs(p); setTab("home"); }} />
        </div>
      </>
    );
  }

  return (
    <>
      <style>{STYLE}</style>
      <div className="app">
        <div className="top-bar">
          <div className="brand">Health<em>Fund</em></div>
          {(tab==="plan"||tab==="meals"||tab==="grocery"||tab==="learn"||tab==="progress")&&(
            <div className="access-badge">Full Access</div>
          )}
          {(tab==="home"||tab==="workout")&&(
            <div style={{fontSize:"0.7rem",color:"var(--muted)",fontWeight:700}}>
              {prefs.level.charAt(0).toUpperCase()+prefs.level.slice(1)} · Wk {prefs.week}
            </div>
          )}
        </div>

        {tab==="home"    && <HomeTab prefs={prefs} setPrefs={setPrefs} setTab={setTab}/>}
        {tab==="workout" && <WorkoutTab prefs={prefs} setPrefs={setPrefs} onRebuild={()=>setPrefs(null)}/>}
        {tab==="plan"    && <PlanTab prefs={prefs} setPrefs={setPrefs} mealState={mealState} setMealState={setMealState} setTab={setTab}/>}
        {tab==="meals"   && <MealsTab prefs={prefs} mealState={mealState} setMealState={setMealState} goal={prefs.goal||"maintain"} setTab={setTab}/>}
        {tab==="grocery" && <GroceryTab prefs={prefs} mealState={mealState}/>}
        {tab==="learn"    && <LearnTab/>}
        {tab==="progress" && <ProgressTeaserTab/>}
      </div>

      <div className="bottom-nav">
        {NAV.map(n=>(
          <button key={n.id} className={`nav-btn${tab===n.id?" active":""}`} onClick={()=>setTab(n.id)}>
            <span className="nav-icon">{n.icon}</span>
            <span className="nav-label">{n.label}</span>
          </button>
        ))}
      </div>
    </>
  );
}


window._appReady = true;
if (window._unlockPending) { mountApp(); }

</script>
</body>
</html>
