<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

  <script type="text/babel">
const { useState } = React;

const GUMROAD_URL = "https://rochesterian3.gumroad.com/l/xoizj";

const STYLE = `
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lato:ital,wght@0,300;0,400;0,700;1,300&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b08;--s1:#131410;--s2:#1b1d16;--s3:#22251a;--border:#272920;
  --accent:#c8f135;--adim:rgba(200,241,53,0.11);--aborder:rgba(200,241,53,0.26);
  --orange:#f5a623;--odim:rgba(245,166,35,0.1);--oborder:rgba(245,166,35,0.25);
  --blue:#5db8fe;--bdim:rgba(93,184,254,0.1);--bborder:rgba(93,184,254,0.25);
  --red:#ff6b6b;--rdim:rgba(255,107,107,0.1);--rborder:rgba(255,107,107,0.25);
  --purple:#c084fc;--pdim:rgba(192,132,252,0.1);--pborder:rgba(192,132,252,0.25);
  --text:#e9ead6;--muted:#656857;--muted2:#3e4033;
  --r:14px;--r-sm:8px;--r-xs:6px;
}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;max-width:430px;margin:0 auto;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
.app{display:flex;flex-direction:column;min-height:100vh;padding-bottom:92px;}

.top-bar{padding:16px 18px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;background:rgba(10,11,8,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.brand{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;}
.brand em{color:var(--accent);font-style:normal;}
.free-badge{background:var(--s2);border:1px solid var(--border);border-radius:99px;padding:4px 12px;font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,11,8,0.96);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 20px;z-index:100;}
.nav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 10px;transition:all 0.15s;}
.nav-icon{font-size:1.2rem;}
.nav-label{font-size:0.56rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);transition:color 0.15s;}
.nav-btn.active .nav-label{color:var(--accent);}
.nav-btn.locked .nav-icon{filter:grayscale(1);opacity:0.35;}
.nav-btn.locked .nav-label{opacity:0.35;}

.hero{margin:14px 16px 0;padding:20px;background:linear-gradient(140deg,#141b08 0%,#0a0f05 100%);border:1px solid #1f2814;border-radius:var(--r);position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(200,241,53,0.08) 0%,transparent 70%);}
.hero-eyebrow{font-size:0.62rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;}
.hero-title{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;line-height:1.05;color:var(--text);}
.hero-sub{font-size:0.78rem;color:var(--muted);margin-top:7px;line-height:1.5;}

.section-head{padding:20px 18px 10px;display:flex;justify-content:space-between;align-items:baseline;}
.section-title{font-family:'Syne',sans-serif;font-size:1.25rem;font-weight:800;color:var(--text);}
.section-sub{font-size:0.7rem;color:var(--muted);font-family:'DM Mono',monospace;}

.card-stack{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;transition:border-color 0.18s;}
.card.clickable{cursor:pointer;}
.card.clickable:active{transform:scale(0.985);}
.card.open{border-color:var(--aborder);}
.card.open-orange{border-color:var(--oborder);}

.tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.tag{font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:99px;border:1px solid var(--border);color:var(--muted);background:var(--s2);}
.tag-g{background:var(--adim);color:var(--accent);border-color:var(--aborder);}
.tag-o{background:var(--odim);color:var(--orange);border-color:var(--oborder);}
.tag-b{background:var(--bdim);color:var(--blue);border-color:var(--bborder);}

.card-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;color:var(--text);line-height:1.2;}
.card-desc{font-size:0.77rem;color:var(--muted);margin-top:4px;line-height:1.45;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;}
.chevron{font-size:0.9rem;color:var(--muted);transition:transform 0.2s;flex-shrink:0;margin-left:6px;margin-top:2px;}
.chevron.open{transform:rotate(180deg);color:var(--accent);}
.card-detail{margin-top:14px;border-top:1px solid var(--border);padding-top:14px;}

.ex-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;padding:10px 0;border-bottom:1px solid rgba(39,41,32,0.7);}
.ex-row:last-of-type{border-bottom:none;}
.ex-name{font-size:0.88rem;font-weight:700;color:var(--text);}
.ex-tip{font-size:0.72rem;color:var(--muted);margin-top:2px;line-height:1.4;}
.ex-sets{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--accent);white-space:nowrap;text-align:right;}

.action-btn{width:100%;border:none;border-radius:var(--r-sm);padding:13px;font-family:'Lato',sans-serif;font-size:0.8rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity 0.15s;margin-top:14px;}
.action-btn:active{opacity:0.75;}
.btn-primary{background:var(--accent);color:#0a0b08;}
.btn-secondary{background:var(--s2);border:1px solid var(--border);color:var(--text);}
.btn-saved{background:var(--s2);border:1px solid var(--aborder);color:var(--accent);}

/* ONBOARD */
.onboard-wrap{padding:16px;}
.onboard-step{margin-bottom:20px;}
.step-label{font-size:0.62rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
.step-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--text);margin-bottom:12px;}
.cardio-option{background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;cursor:pointer;transition:all 0.15s;}
.cardio-option.selected{border-color:var(--aborder);background:var(--adim);}
.co-title{font-size:0.84rem;font-weight:700;color:var(--text);}
.co-detail{font-size:0.72rem;color:var(--muted);margin-top:2px;}
.generate-btn{width:100%;background:var(--accent);color:#0a0b08;border:none;border-radius:var(--r-sm);padding:14px;font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:800;letter-spacing:0.04em;cursor:pointer;margin-top:16px;transition:opacity 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.generate-btn:active{opacity:0.8;}
.generate-btn:disabled{opacity:0.35;cursor:not-allowed;}

/* UPGRADE */
.upgrade-banner{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#151f06,#0c1404);border:1px solid var(--aborder);border-radius:var(--r);padding:16px;margin:0 16px 14px;text-decoration:none;cursor:pointer;transition:opacity 0.2s;}
.upgrade-banner:active{opacity:0.85;}
.ub-icon{font-size:1.8rem;flex-shrink:0;}
.ub-eyebrow{font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:3px;}
.ub-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--text);line-height:1.15;}
.ub-sub{font-size:0.72rem;color:var(--muted);margin-top:3px;}
.ub-arrow{margin-left:auto;color:var(--accent);font-size:1.1rem;flex-shrink:0;}

.lock-gate{background:linear-gradient(160deg,#141a07,#0b1004);border:1px solid var(--aborder);border-radius:var(--r);padding:28px 22px;text-align:center;cursor:pointer;transition:opacity 0.2s;}
.lock-gate:active{opacity:0.85;}
.lock-icon{font-size:2.4rem;margin-bottom:12px;}
.lock-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:8px;}
.lock-desc{font-size:0.8rem;color:var(--muted);line-height:1.55;margin-bottom:18px;}
.lock-features{list-style:none;margin-bottom:20px;text-align:left;display:flex;flex-direction:column;gap:8px;}
.lock-features li{font-size:0.8rem;color:var(--text);display:flex;gap:10px;align-items:flex-start;}
.lock-features li::before{content:'✓';color:var(--accent);font-weight:700;flex-shrink:0;margin-top:1px;}
.lock-btn{display:inline-block;background:var(--accent);color:#0a0b08;border:none;border-radius:var(--r-sm);padding:13px 28px;font-family:'Lato',sans-serif;font-size:0.82rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;cursor:pointer;text-decoration:none;width:100%;text-align:center;}
.lock-price{font-size:0.7rem;color:var(--muted);margin-top:10px;}

/* MEAL PREVIEW (teaser) */
.meal-preview-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative;}
.meal-preview-blur{filter:blur(3px);pointer-events:none;opacity:0.5;padding:14px 16px;}
.meal-preview-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:rgba(10,11,8,0.6);backdrop-filter:blur(2px);cursor:pointer;padding:20px;}
.mpo-label{font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--orange);}
.mpo-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--text);text-align:center;line-height:1.3;}
.mpo-btn{background:var(--accent);color:#0a0b08;border:none;border-radius:99px;padding:8px 20px;font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;margin-top:4px;}

/* EDU */
.edu-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color 0.18s;}
.edu-card.eg{border-color:var(--aborder);}
.edu-card.eo{border-color:var(--oborder);}
.edu-card.eb{border-color:var(--bborder);}
.edu-header{padding:16px 18px;display:flex;align-items:center;gap:14px;}
.edu-icon{font-size:1.8rem;flex-shrink:0;}
.edu-num{font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.edu-title-t{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--text);line-height:1.2;}
.edu-preview{font-size:0.74rem;color:var(--muted);margin-top:3px;}
.edu-body{padding:0 18px 18px;border-top:1px solid var(--border);}
.edu-h{font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;margin-top:16px;}
.edu-h.cg{color:var(--accent);}
.edu-h.co{color:var(--orange);}
.edu-h.cb{color:var(--blue);}
.edu-text{font-size:0.82rem;color:var(--muted);line-height:1.6;}
.edu-callout{background:var(--s2);border-radius:var(--r-sm);padding:12px 14px;margin-top:12px;}
.edu-callout.cg{border-left:3px solid var(--aborder);}
.edu-callout.co{border-left:3px solid var(--oborder);}
.edu-callout.cb{border-left:3px solid var(--bborder);}
.edu-callout-label{font-size:0.6rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px;}
.edu-callout-label.cg{color:var(--accent);}
.edu-callout-label.co{color:var(--orange);}
.edu-callout-label.cb{color:var(--blue);}
.edu-callout-text{font-size:0.8rem;color:var(--text);line-height:1.5;}
.edu-stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.edu-stat-box{background:var(--s1);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;}
.edu-stat-val{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;}
.edu-stat-val.cg{color:var(--accent);}
.edu-stat-val.co{color:var(--orange);}
.edu-stat-val.cb{color:var(--blue);}
.edu-stat-label{font-size:0.7rem;color:var(--muted);margin-top:2px;line-height:1.3;}
.checklist{list-style:none;margin-top:10px;display:flex;flex-direction:column;gap:7px;}
.checklist li{display:flex;gap:9px;font-size:0.8rem;color:var(--text);line-height:1.4;align-items:flex-start;}
.checklist li.cg::before{content:'✓';color:var(--accent);font-weight:700;font-size:0.75rem;margin-top:1px;flex-shrink:0;}
.checklist li.co::before{content:'✓';color:var(--orange);font-weight:700;font-size:0.75rem;margin-top:1px;flex-shrink:0;}
.checklist li.cb::before{content:'✓';color:var(--blue);font-weight:700;font-size:0.75rem;margin-top:1px;flex-shrink:0;}

.toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%);background:var(--s2);color:var(--text);border:1px solid var(--aborder);padding:10px 22px;border-radius:99px;font-size:0.78rem;font-weight:700;letter-spacing:0.05em;z-index:300;white-space:nowrap;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast span{color:var(--accent);}
.toast.show{opacity:1;}

.field-label{font-size:0.62rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);}
.field-input{background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;font-family:'DM Mono',monospace;font-size:0.92rem;color:var(--text);outline:none;width:100%;transition:border-color 0.15s;-moz-appearance:textfield;}
.field-input:focus{border-color:var(--aborder);}
.field-input::-webkit-inner-spin-button{display:none;}
`;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function copyText(t){try{navigator.clipboard.writeText(t);}catch{const e=document.createElement("textarea");e.value=t;e.style.cssText="position:fixed;opacity:0";document.body.appendChild(e);e.select();document.execCommand("copy");document.body.removeChild(e);}}
function Toast({msg,show}){return <div className={`toast${show?" show":""}`}><span>✓</span> {msg}</div>;}

// ─── ONBOARDING ───────────────────────────────────────────────────────────────
function Onboarding({ onDone }) {
  const [step, setStep] = useState(0);
  const [sex, setSex]   = useState("");
  const [goal, setGoal] = useState("");

  const canNext = [sex !== "", goal !== ""];

  const STEPS = [
    <div key="s0">
      <div className="step-label">Step 1 of 2</div>
      <div className="step-title">Let's personalize your starter week.</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[["male","Male 💪","Strength-focused, full body"],["female","Female 🍑","Glutes, legs & toning"]].map(([v,l,s])=>(
          <div key={v} className={`cardio-option${sex===v?" selected":""}`} onClick={()=>setSex(v)} style={{textAlign:"center"}}>
            <div className="co-title">{l}</div>
            <div className="co-detail">{s}</div>
          </div>
        ))}
      </div>
      {sex && (
        <div style={{marginTop:12,background:sex==="female"?"var(--pdim)":"var(--adim)",border:`1px solid ${sex==="female"?"var(--pborder)":"var(--aborder)"}`,borderRadius:"var(--r-sm)",padding:"10px 14px",fontSize:"0.78rem",color:"var(--text)",lineHeight:1.5}}>
          {sex==="female"
            ? "🍑 Your starter week focuses on glutes, legs & core every session with upper body toning."
            : "💪 Your starter week builds full-body strength across 3 sessions."}
        </div>
      )}
    </div>,

    <div key="s1">
      <div className="step-label">Step 2 of 2</div>
      <div className="step-title">What's your main goal right now?</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {[
          ["cut",    sex==="female"?"Lean Out 🔥":"Lose Fat 🔥",     "Calorie deficit, preserve muscle"],
          ["maintain",sex==="female"?"Recomp & Tone ⚖️":"Get Stronger ⚖️","Build habits, improve body comp"],
          ["build",  sex==="female"?"Build & Sculpt 💪":"Build Muscle 💪","Calorie surplus, grow muscle"],
        ].map(([v,l,s])=>(
          <div key={v} className={`cardio-option${goal===v?" selected":""}`} onClick={()=>setGoal(v)}>
            <div className="co-title">{l}</div>
            <div className="co-detail">{s}</div>
          </div>
        ))}
      </div>
    </div>,
  ];

  const isLast = step === STEPS.length - 1;
  return (
    <div>
      <div className="section-head">
        <span className="section-title">Build Your Plan</span>
        <span className="section-sub">Step {step+1} of 2</span>
      </div>
      <div style={{padding:"0 16px 16px",display:"flex",gap:6}}>
        {STEPS.map((_,i)=>(
          <div key={i} style={{flex:1,height:3,borderRadius:99,background:i<=step?"var(--accent)":"var(--s3)",transition:"background 0.3s"}}/>
        ))}
      </div>
      <div className="onboard-wrap">
        <div className="onboard-step">{STEPS[step]}</div>
        <div style={{display:"flex",gap:10}}>
          {step > 0 && (
            <button className="action-btn btn-secondary" style={{flex:"0 0 80px",marginTop:0}} onClick={()=>setStep(s=>s-1)}>← Back</button>
          )}
          <button className="generate-btn" style={{flex:1,marginTop:0,borderRadius:"var(--r-sm)",padding:13,fontSize:"0.82rem"}}
            disabled={!canNext[step]}
            onClick={()=>{ if(isLast) onDone({sex,goal}); else setStep(s=>s+1); }}>
            {isLast ? "⚡ Start My Free Week" : "Continue →"}
          </button>
        </div>
      </div>
    </div>
  );
}
